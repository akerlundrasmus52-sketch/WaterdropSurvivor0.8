<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Water Drop Survivor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: 'Courier New', monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #gameCanvas {
      display: block;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0f1f2e;
      box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
    }

    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #FFD700;
      font-size: 14px;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.8), 0 0 5px rgba(255, 215, 0, 0.5);
      pointer-events: none;
      line-height: 1.6;
      background: rgba(15, 31, 46, 0.7);
      padding: 10px;
      border: 2px solid #FFD700;
      border-radius: 0px;
    }

    .health-bar {
      width: 200px;
      height: 20px;
      background: #0f1f2e;
      border: 3px solid #FFD700;
      border-radius: 0px;
      margin: 5px 0;
      position: relative;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #5DADE2 0%, #5DADE2 100%);
      transition: width 0.3s;
    }

    .exp-bar {
      width: 200px;
      height: 15px;
      background: #0f1f2e;
      border: 3px solid #FFA500;
      border-radius: 0px;
      margin: 5px 0;
      position: relative;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 0 10px rgba(255, 165, 0, 0.3);
    }

    .exp-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%);
      transition: width 0.3s;
    }

    .modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15, 31, 46, 0.95);
      border: 4px solid #FFD700;
      border-radius: 0px;
      padding: 20px;
      color: #FFD700;
      pointer-events: auto;
      display: none;
      max-width: 90%;
      max-height: 80%;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 0 10px rgba(0, 0, 0, 0.5);
      image-rendering: pixelated;
    }

    .modal.active {
      display: block;
    }

    .modal h2 {
      margin-bottom: 15px;
      color: #FFA500;
      text-align: center;
    }

    .upgrade-option {
      background: rgba(26, 58, 46, 0.8);
      border: 3px solid #5DADE2;
      border-radius: 0px;
      padding: 15px;
      margin: 10px 0;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 10px rgba(93, 173, 226, 0.3);
    }

    .upgrade-option:hover {
      background: rgba(93, 173, 226, 0.4);
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(93, 173, 226, 0.6);
    }

    .upgrade-option h3 {
      color: #5DADE2;
      margin-bottom: 5px;
    }

    .upgrade-option p {
      color: #FFD700;
      font-size: 12px;
    }

    .button {
      background: #5DADE2;
      border: 3px solid #FFD700;
      border-radius: 0px;
      padding: 10px 20px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      pointer-events: auto;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #3498DB, 0 0 10px rgba(255, 215, 0, 0.3);
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    .button:hover {
      background: #FFD700;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #FFA500, 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #3498DB, 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .joystick {
      position: absolute;
      bottom: 80px;
      left: 50px;
      width: 120px;
      height: 120px;
      pointer-events: auto;
      z-index: 50;
    }

    .joystick-base {
      width: 100%;
      height: 100%;
      background: rgba(93, 173, 226, 0.3);
      border: 3px solid #5DADE2;
      border-radius: 50%;
      position: relative;
    }

    .joystick-stick {
      width: 50px;
      height: 50px;
      background: #5DADE2;
      border: 2px solid #FFD700;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.1s;
    }

    .status-message {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 215, 0, 0.9);
      color: #1a1a2e;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      pointer-events: none;
      display: none;
      z-index: 60;
    }

    .menu-button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(93, 173, 226, 0.9);
      border: 3px solid #FFD700;
      border-radius: 0px;
      padding: 10px 15px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      z-index: 50;
      box-shadow: 0 4px 0 #3498DB, 0 0 10px rgba(255, 215, 0, 0.5);
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
      transition: all 0.1s;
    }
    
    .menu-button:hover {
      background: rgba(255, 215, 0, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #FFA500, 0 0 20px rgba(255, 215, 0, 0.7);
    }
    
    .menu-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #3498DB, 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .shop-item {
      background: rgba(139, 69, 19, 0.3);
      border: 2px solid #8B4513;
      border-radius: 5px;
      padding: 10px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shop-item.locked {
      opacity: 0.5;
    }

    .shop-item button {
      background: #FFD700;
      border: none;
      padding: 5px 15px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      color: #1a1a2e;
    }

    .shop-item button:disabled {
      background: #666;
      cursor: not-allowed;
    }

    /* Pixel Art Load Screen */
    #loadScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0f1f2e 0%, #1a3a2e 50%, #0f1f2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.5s ease-out;
    }

    #loadScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .load-title {
      font-size: 48px;
      font-weight: bold;
      color: #5DADE2;
      text-shadow: 4px 4px 0 #2574A9, 0 0 20px rgba(93, 173, 226, 0.8);
      margin-bottom: 30px;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .load-water-drop {
      width: 80px;
      height: 100px;
      margin-bottom: 40px;
      position: relative;
    }

    .load-water-drop::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: #5DADE2;
      clip-path: polygon(50% 0%, 80% 30%, 80% 70%, 50% 100%, 20% 70%, 20% 30%);
      animation: dropFloat 2s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(93, 173, 226, 0.6);
    }

    @keyframes dropFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }

    .loading-bar-container {
      width: 300px;
      height: 30px;
      background: #0f1f2e;
      border: 4px solid #FFD700;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #5DADE2, #FFD700, #FFA500);
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    .load-text {
      margin-top: 20px;
      color: #FFD700;
      font-size: 18px;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
    }

    /* Pixel Art Main Menu */
    #mainMenu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0f1f2e 0%, #1a3a2e 50%, #0f1f2e 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #mainMenu.active {
      display: flex;
    }

    .menu-title {
      font-size: 64px;
      font-weight: bold;
      color: #5DADE2;
      text-shadow: 6px 6px 0 #2574A9, 0 0 30px rgba(93, 173, 226, 0.8);
      margin-bottom: 20px;
      animation: titlePulse 2s ease-in-out infinite;
    }

    .menu-subtitle {
      font-size: 24px;
      color: #FFD700;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.8);
      margin-bottom: 50px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-btn {
      background: #5DADE2;
      border: 4px solid #FFD700;
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 6px 0 #3498DB, 0 0 20px rgba(255, 215, 0, 0.5);
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
      transition: all 0.1s;
      min-width: 250px;
    }

    .menu-btn:hover {
      background: #FFD700;
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #FFA500, 0 0 30px rgba(255, 215, 0, 0.8);
    }

    .menu-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #3498DB, 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .menu-water-drop {
      width: 120px;
      height: 150px;
      margin-bottom: 40px;
      position: relative;
    }

    .menu-water-drop::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: #5DADE2;
      clip-path: polygon(50% 0%, 80% 30%, 80% 70%, 50% 100%, 20% 70%, 20% 30%);
      animation: dropFloat 2s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(93, 173, 226, 0.8);
    }
  </style>
</head>
<body>
  <!-- Pixel Art Load Screen -->
  <div id="loadScreen">
    <div class="load-title">💧 WATER DROP SURVIVOR 💧</div>
    <div class="load-water-drop"></div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="load-text">Loading pixel art assets...</div>
  </div>

  <!-- Pixel Art Main Menu -->
  <div id="mainMenu">
    <div class="menu-water-drop"></div>
    <div class="menu-title">💧 WATER DROP SURVIVOR 💧</div>
    <div class="menu-subtitle">Pixel Art Edition</div>
    <div class="menu-buttons">
      <button class="menu-btn" id="startGameBtn">▶ START GAME</button>
      <button class="menu-btn" id="continueGameBtn" style="display: none;">↻ CONTINUE</button>
      <button class="menu-btn" id="menuAchievementsBtn">🏆 ACHIEVEMENTS</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>
  
  <div class="ui-overlay">
    <div class="hud">
      <div>Level: <span id="level">1</span></div>
      <div class="health-bar">
        <div class="health-fill" id="healthFill" style="width: 100%"></div>
      </div>
      <div><span id="health">100</span> / <span id="maxHealth">100</span> HP</div>
      <div class="exp-bar">
        <div class="exp-fill" id="expFill" style="width: 0%"></div>
      </div>
      <div>EXP: <span id="exp">0</span> / <span id="expNeeded">10</span></div>
      <div>Gold: <span id="gold">0</span></div>
      <div>Kills: <span id="kills">0</span></div>
      <div>Time: <span id="time">0:00</span></div>
    </div>

    <button class="menu-button" id="menuBtn">⚙ Menu</button>

    <div class="status-message" id="statusMsg"></div>

    <div class="modal" id="levelUpModal">
      <h2>🎉 LEVEL UP! 🎉</h2>
      <div id="upgradeOptions"></div>
    </div>

    <div class="modal" id="pauseModal">
      <h2>⚙ PAUSED ⚙</h2>
      <button class="button" id="resumeBtn">Resume</button>
      <button class="button" id="shopBtn">Shop</button>
      <button class="button" id="achievementsBtn">Achievements</button>
      <button class="button" id="saveBtn">Save Game</button>
      <button class="button" id="loadBtn">Load Game</button>
      <button class="button" id="mainMenuBtnFromPause">Main Menu</button>
      <button class="button" id="restartBtn">Restart</button>
    </div>

    <div class="modal" id="shopModal">
      <h2>💰 SHOP 💰</h2>
      <div id="shopItems"></div>
      <button class="button" id="closeShopBtn">Close</button>
    </div>

    <div class="modal" id="achievementsModal">
      <h2>🏆 ACHIEVEMENTS 🏆</h2>
      <div id="achievementsList"></div>
      <button class="button" id="closeAchievementsBtn">Close</button>
    </div>

    <div class="modal" id="victoryModal">
      <h2>🎊 VICTORY! 🎊</h2>
      <p>You reached level 50!</p>
      <p>Final Stats:</p>
      <div id="finalStats"></div>
      <button class="button" id="restartFromVictoryBtn">Play Again</button>
    </div>

    <div class="joystick" id="joystick">
      <div class="joystick-base">
        <div class="joystick-stick" id="joystickStick"></div>
      </div>
    </div>
  </div>

  <script>
    // === LOAD SCREEN AND MENU MANAGEMENT ===
    let gameStarted = false;
    const loadScreen = document.getElementById('loadScreen');
    const mainMenu = document.getElementById('mainMenu');
    const loadingBar = document.getElementById('loadingBar');
    const canvas = document.getElementById('gameCanvas');
    
    // Simulate loading with progress bar
    let loadProgress = 0;
    const loadInterval = setInterval(() => {
      loadProgress += Math.random() * 15 + 5;
      if (loadProgress >= 100) {
        loadProgress = 100;
        loadingBar.style.width = '100%';
        clearInterval(loadInterval);
        setTimeout(() => {
          loadScreen.classList.add('hidden');
          setTimeout(() => {
            loadScreen.style.display = 'none';
            showMainMenu();
          }, 500);
        }, 500);
      } else {
        loadingBar.style.width = loadProgress + '%';
      }
    }, 100);
    
    function showMainMenu() {
      mainMenu.classList.add('active');
      canvas.style.display = 'none';
      document.querySelector('.ui-overlay').style.display = 'none';
    }
    
    function hideMainMenu() {
      mainMenu.classList.remove('active');
      canvas.style.display = 'block';
      document.querySelector('.ui-overlay').style.display = 'block';
    }
    
    // Menu button handlers
    document.getElementById('startGameBtn').addEventListener('click', () => {
      hideMainMenu();
      if (!gameStarted) {
        gameStarted = true;
        startGame();
      } else {
        startNewGame();
      }
    });
    
    document.getElementById('continueGameBtn').addEventListener('click', () => {
      hideMainMenu();
      gameState.paused = false;
    });
    
    document.getElementById('menuAchievementsBtn').addEventListener('click', () => {
      document.getElementById('achievementsModal').classList.add('active');
      showAchievements();
    });
    
    // === GAME CONSTANTS ===
    const COLORS = {
      blue: '#5DADE2',
      gold: '#FFD700',
      orange: '#FFA500',
      brown: '#8B4513',
      bg1: '#1a1a2e',
      bg2: '#16213e',
      white: '#ffffff',
      black: '#000000'
    };

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const MAP_WIDTH = 3000;
    const MAP_HEIGHT = 3000;

    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      const container = canvas.parentElement;
      const ratio = CANVAS_WIDTH / CANVAS_HEIGHT;
      let width = window.innerWidth;
      let height = window.innerHeight;
      
      if (width / height > ratio) {
        width = height * ratio;
      } else {
        height = width / ratio;
      }
      
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      canvas.width = CANVAS_WIDTH;
      canvas.height = CANVAS_HEIGHT;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // === TIMING VARIABLES - INITIALIZED TO 0 (FIX FREEZE BUG) ===
    let lastTime = 0;
    let gameTime = 0;
    let dt = 0;

    // === GAME DATA ===
    let gameState = {
      paused: true,  // Start paused until menu selection
      gameOver: false,
      victory: false,
      player: {
        x: MAP_WIDTH / 2,
        y: MAP_HEIGHT / 2,
        vx: 0,
        vy: 0,
        size: 16,
        health: 100,
        maxHealth: 100,
        level: 1,
        exp: 0,
        expNeeded: 10,
        gold: 0,
        kills: 0,
        strength: 1,
        speed: 1,
        critChance: 0.1,
        critDamage: 1.5,
        damage: 1,
        atkSpeed: 1,
        dodge: 0,
        evasion: 0,
        healthRegen: 0,
        walkSpeed: 1,
        armor: 0,
        weapons: [],
        vampirism: 0
      },
      enemies: [],
      projectiles: [],
      particles: [],
      expOrbs: [],
      miniBosses: [],
      decals: [],
      camera: { x: 0, y: 0 },
      keys: {},
      joystick: { active: false, x: 0, y: 0 },
      shopPurchases: {},
      achievements: [],
      screenFlash: null,
      cameraShake: null
    };

    const WEAPON_TYPES = {
      gun: {
        name: 'Gun',
        damage: 15,
        cooldown: 1000,
        range: 400,
        projectileSpeed: 300,
        type: 'projectile'
      },
      sword: {
        name: 'Sword',
        damage: 25,
        cooldown: 800,
        range: 60,
        type: 'melee'
      },
      doubleBarrel: {
        name: 'Double Barrel',
        damage: 12,
        cooldown: 1500,
        range: 350,
        projectileSpeed: 400,
        projectileCount: 5,
        spread: 0.3,
        type: 'projectile'
      },
      aura: {
        name: 'Energy Aura',
        damage: 8,
        cooldown: 500,
        range: 100,
        type: 'aura'
      }
    };

    const UPGRADES = [
      {
        id: 'atkUp',
        name: 'Attack Up',
        description: '+10% Attack Damage',
        apply: (player) => { player.damage *= 1.1; }
      },
      {
        id: 'atkSpeedUp',
        name: 'Attack Speed Up',
        description: '+10% Attack Speed',
        apply: (player) => { player.atkSpeed *= 1.1; }
      },
      {
        id: 'armorUp',
        name: 'Armor Up',
        description: '+25% Armor',
        apply: (player) => { player.armor += 0.25; }
      },
      {
        id: 'healthUp',
        name: 'Max Health Up',
        description: '+20 Max Health',
        apply: (player) => {
          player.maxHealth += 20;
          player.health += 20;
        }
      },
      {
        id: 'speedUp',
        name: 'Movement Speed Up',
        description: '+15% Movement Speed',
        apply: (player) => { player.walkSpeed *= 1.15; }
      },
      {
        id: 'critChanceUp',
        name: 'Critical Chance Up',
        description: '+5% Critical Chance',
        apply: (player) => { player.critChance += 0.05; }
      },
      {
        id: 'critDamageUp',
        name: 'Critical Damage Up',
        description: '+25% Critical Damage',
        apply: (player) => { player.critDamage += 0.25; }
      },
      {
        id: 'healthRegen',
        name: 'Health Regeneration',
        description: '+1 HP/sec',
        apply: (player) => { player.healthRegen += 1; }
      },
      {
        id: 'vampire',
        name: 'Vampirism',
        description: 'Heal 5% of damage dealt',
        apply: (player) => { player.vampirism += 0.05; }
      }
    ];

    const SHOP_ITEMS = [
      {
        id: 'permHealth',
        name: 'Permanent Health +50',
        cost: 100,
        repeatable: false,
        apply: (player) => {
          player.maxHealth += 50;
          player.health += 50;
        }
      },
      {
        id: 'permDamage',
        name: 'Permanent Damage +20%',
        cost: 150,
        repeatable: false,
        apply: (player) => { player.damage *= 1.2; }
      },
      {
        id: 'permSpeed',
        name: 'Permanent Speed +25%',
        cost: 120,
        repeatable: false,
        apply: (player) => { player.walkSpeed *= 1.25; }
      },
      {
        id: 'startGold',
        name: 'Start with +50 Gold',
        cost: 200,
        repeatable: false,
        apply: () => {}
      }
    ];

    const ACHIEVEMENT_DEFS = [
      { id: 'firstKill', name: 'First Blood', description: 'Kill your first enemy', check: () => gameState.player.kills >= 1 },
      { id: 'kill10', name: 'Warrior', description: 'Kill 10 enemies', check: () => gameState.player.kills >= 10 },
      { id: 'kill50', name: 'Slayer', description: 'Kill 50 enemies', check: () => gameState.player.kills >= 50 },
      { id: 'kill100', name: 'Legend', description: 'Kill 100 enemies', check: () => gameState.player.kills >= 100 },
      { id: 'level10', name: 'Apprentice', description: 'Reach level 10', check: () => gameState.player.level >= 10 },
      { id: 'level25', name: 'Expert', description: 'Reach level 25', check: () => gameState.player.level >= 25 },
      { id: 'level50', name: 'Master', description: 'Reach level 50', check: () => gameState.player.level >= 50 },
      { id: 'gold500', name: 'Wealthy', description: 'Collect 500 gold', check: () => gameState.player.gold >= 500 },
      { id: 'survive5min', name: 'Survivor', description: 'Survive 5 minutes', check: () => gameTime >= 300 }
    ];

    function initGame() {
      lastTime = 0;
      gameTime = 0;
      dt = 0;
      
      gameState.player = {
        x: MAP_WIDTH / 2,
        y: MAP_HEIGHT / 2,
        vx: 0,
        vy: 0,
        size: 16,
        health: 100,
        maxHealth: 100,
        level: 1,
        exp: 0,
        expNeeded: 10,
        gold: gameState.shopPurchases.startGold ? 50 : 0,
        kills: 0,
        strength: 1,
        speed: 1,
        critChance: 0.1,
        critDamage: 1.5,
        damage: 1,
        atkSpeed: 1,
        dodge: 0,
        evasion: 0,
        healthRegen: 0,
        walkSpeed: 1,
        armor: 0,
        weapons: [
          { ...WEAPON_TYPES.gun, lastFired: 0, level: 1 }
        ],
        vampirism: 0
      };
      
      if (gameState.shopPurchases.permHealth) {
        gameState.player.maxHealth += 50;
        gameState.player.health += 50;
      }
      if (gameState.shopPurchases.permDamage) {
        gameState.player.damage *= 1.2;
      }
      if (gameState.shopPurchases.permSpeed) {
        gameState.player.walkSpeed *= 1.25;
      }
      
      gameState.enemies = [];
      gameState.projectiles = [];
      gameState.particles = [];
      gameState.expOrbs = [];
      gameState.miniBosses = [];
      gameState.decals = [];
      gameState.screenFlash = null;
      gameState.cameraShake = null;
      gameState.paused = false;
      gameState.gameOver = false;
      gameState.victory = false;
      
      hideAllModals();
      updateHUD();
    }

    function spawnEnemy() {
      const angle = Math.random() * Math.PI * 2;
      const distance = 500 + Math.random() * 300;
      const x = gameState.player.x + Math.cos(angle) * distance;
      const y = gameState.player.y + Math.sin(angle) * distance;
      
      const types = ['square', 'triangle', 'round'];
      const type = types[Math.floor(Math.random() * types.length)];
      
      const scaleFactor = 1 + gameState.player.level * 0.1;
      
      gameState.enemies.push({
        x, y, vx: 0, vy: 0, size: 12, type,
        health: 100 * scaleFactor,
        maxHealth: 100 * scaleFactor,
        speed: 0.5 + Math.random() * 0.3,
        damage: 33 * scaleFactor,
        lastAttack: 0,
        attackCooldown: 1000
      });
    }

    function spawnMiniBoss() {
      const angle = Math.random() * Math.PI * 2;
      const distance = 600;
      const x = gameState.player.x + Math.cos(angle) * distance;
      const y = gameState.player.y + Math.sin(angle) * distance;
      
      const scaleFactor = 1 + gameState.player.level * 0.15;
      
      gameState.enemies.push({
        x, y, vx: 0, vy: 0, size: 30, type: 'boss',
        health: 500 * scaleFactor,
        maxHealth: 500 * scaleFactor,
        speed: 0.3,
        damage: 50 * scaleFactor,
        lastAttack: 0,
        attackCooldown: 800,
        isBoss: true
      });
      
      showStatusMessage('⚠️ MINI-BOSS SPAWNED! ⚠️');
    }

    function update(deltaTime) {
      if (gameState.paused || gameState.gameOver || gameState.victory) return;
      
      const delta = deltaTime / 1000;
      gameTime += delta;
      
      // Update screen effects
      if (gameState.screenFlash && gameState.screenFlash.time < gameState.screenFlash.duration) {
        gameState.screenFlash.time += delta;
      }
      if (gameState.cameraShake && gameState.cameraShake.time < gameState.cameraShake.duration) {
        gameState.cameraShake.time += delta;
      }
      
      const minutes = Math.floor(gameTime / 60);
      const seconds = Math.floor(gameTime % 60);
      document.getElementById('time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      if (gameState.player.level >= 50 && !gameState.victory) {
        gameState.victory = true;
        showVictory();
        return;
      }
      
      updatePlayer(delta);
      updateWeapons(delta);
      updateEnemies(delta);
      updateProjectiles(delta);
      updateParticles(delta);
      updateExpOrbs(delta);
      
      if (Math.random() < 0.02 + gameState.player.level * 0.001) {
        spawnEnemy();
      }
      
      if (gameTime % 30 < delta && gameTime > 10) {
        spawnMiniBoss();
      }
      
      if (gameState.player.healthRegen > 0) {
        gameState.player.health = Math.min(
          gameState.player.maxHealth,
          gameState.player.health + gameState.player.healthRegen * delta
        );
      }
      
      checkAchievements();
      
      gameState.camera.x = gameState.player.x - CANVAS_WIDTH / 2;
      gameState.camera.y = gameState.player.y - CANVAS_HEIGHT / 2;
      
      updateHUD();
    }

    function updatePlayer(delta) {
      const player = gameState.player;
      const baseSpeed = 200 * player.walkSpeed;
      
      let inputX = 0;
      let inputY = 0;
      
      if (gameState.keys['ArrowLeft'] || gameState.keys['a'] || gameState.keys['A']) inputX -= 1;
      if (gameState.keys['ArrowRight'] || gameState.keys['d'] || gameState.keys['D']) inputX += 1;
      if (gameState.keys['ArrowUp'] || gameState.keys['w'] || gameState.keys['W']) inputY -= 1;
      if (gameState.keys['ArrowDown'] || gameState.keys['s'] || gameState.keys['S']) inputY += 1;
      
      if (gameState.joystick.active) {
        inputX = gameState.joystick.x;
        inputY = gameState.joystick.y;
      }
      
      const mag = Math.sqrt(inputX * inputX + inputY * inputY);
      if (mag > 0) {
        inputX /= mag;
        inputY /= mag;
      }
      
      player.vx = inputX * baseSpeed * delta;
      player.vy = inputY * baseSpeed * delta;
      player.x += player.vx;
      player.y += player.vy;
      
      player.x = Math.max(player.size, Math.min(MAP_WIDTH - player.size, player.x));
      player.y = Math.max(player.size, Math.min(MAP_HEIGHT - player.size, player.y));
    }

    function updateWeapons(delta) {
      const player = gameState.player;
      const currentTime = gameTime;
      
      player.weapons.forEach(weapon => {
        const cooldown = weapon.cooldown / player.atkSpeed;
        
        if (currentTime - weapon.lastFired < cooldown / 1000) return;
        
        let nearestEnemy = null;
        let nearestDist = weapon.range;
        
        gameState.enemies.forEach(enemy => {
          const dx = enemy.x - player.x;
          const dy = enemy.y - player.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < nearestDist) {
            nearestDist = dist;
            nearestEnemy = enemy;
          }
        });
        
        if (!nearestEnemy) return;
        
        weapon.lastFired = currentTime;
        
        if (weapon.type === 'projectile') {
          const angle = Math.atan2(nearestEnemy.y - player.y, nearestEnemy.x - player.x);
          
          if (weapon.projectileCount) {
            for (let i = 0; i < weapon.projectileCount; i++) {
              const spread = (i - weapon.projectileCount / 2) * weapon.spread;
              const projAngle = angle + spread;
              
              gameState.projectiles.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(projAngle) * weapon.projectileSpeed,
                vy: Math.sin(projAngle) * weapon.projectileSpeed,
                damage: calculateDamage(weapon.damage * player.damage),
                size: 4,
                lifetime: weapon.range / weapon.projectileSpeed,
                age: 0,
                owner: 'player'
              });
            }
          } else {
            gameState.projectiles.push({
              x: player.x,
              y: player.y,
              vx: Math.cos(angle) * weapon.projectileSpeed,
              vy: Math.sin(angle) * weapon.projectileSpeed,
              damage: calculateDamage(weapon.damage * player.damage),
              size: 5,
              lifetime: weapon.range / weapon.projectileSpeed,
              age: 0,
              owner: 'player'
            });
          }
        } else if (weapon.type === 'melee') {
          gameState.enemies.forEach(enemy => {
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < weapon.range) {
              const damage = calculateDamage(weapon.damage * player.damage);
              damageEnemy(enemy, damage);
            }
          });
          
          createSlashEffect(player.x, player.y, nearestEnemy.x, nearestEnemy.y);
        } else if (weapon.type === 'aura') {
          gameState.enemies.forEach(enemy => {
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < weapon.range) {
              const damage = calculateDamage(weapon.damage * player.damage);
              damageEnemy(enemy, damage);
            }
          });
        }
      });
    }

    function calculateDamage(baseDamage) {
      const isCrit = Math.random() < gameState.player.critChance;
      if (isCrit) {
        // Screen flash on crit
        gameState.screenFlash = { intensity: 0.4, duration: 0.15, time: 0 };
        // Camera shake on crit
        gameState.cameraShake = { intensity: 8, duration: 0.2, time: 0 };
      }
      return baseDamage * (isCrit ? gameState.player.critDamage : 1);
    }

    function damageEnemy(enemy, damage) {
      enemy.health -= damage;
      
      if (gameState.player.vampirism > 0) {
        const heal = damage * gameState.player.vampirism;
        gameState.player.health = Math.min(gameState.player.maxHealth, gameState.player.health + heal);
      }
      
      // Enhanced damage particles
      const isBigHit = damage > 30;
      createDamageParticle(enemy.x, enemy.y, Math.floor(damage));
      
      // Blood splatter effect
      const particleCount = isBigHit ? 12 : 6;
      for (let i = 0; i < particleCount; i++) {
        const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.5;
        const speed = 50 + Math.random() * 50;
        createParticle(
          enemy.x,
          enemy.y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          enemy.isBoss ? '#FF6B35' : '#8B0000',
          0.8
        );
      }
      
      // Create blood decal (persistent particle)
      if (Math.random() < 0.5) {
        gameState.decals = gameState.decals || [];
        gameState.decals.push({
          x: enemy.x + (Math.random() - 0.5) * enemy.size,
          y: enemy.y + (Math.random() - 0.5) * enemy.size,
          size: 3 + Math.random() * 4,
          alpha: 0.6,
          color: '#4A0000'
        });
        // Limit decals to prevent performance issues
        if (gameState.decals.length > 100) {
          gameState.decals.shift();
        }
      }
      
      if (enemy.health <= 0) {
        killEnemy(enemy);
      }
    }

    function killEnemy(enemy) {
      const index = gameState.enemies.indexOf(enemy);
      if (index > -1) {
        gameState.enemies.splice(index, 1);
      }
      
      gameState.player.kills++;
      
      const expAmount = enemy.isBoss ? 50 : 10;
      for (let i = 0; i < (enemy.isBoss ? 5 : 1); i++) {
        gameState.expOrbs.push({
          x: enemy.x + (Math.random() - 0.5) * 30,
          y: enemy.y + (Math.random() - 0.5) * 30,
          value: expAmount,
          size: enemy.isBoss ? 8 : 5
        });
      }
      
      if (Math.random() < 0.3) {
        const goldAmount = enemy.isBoss ? 20 : 5;
        gameState.player.gold += goldAmount;
      }
      
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 * i) / 8;
        createParticle(
          enemy.x,
          enemy.y,
          Math.cos(angle) * 100,
          Math.sin(angle) * 100,
          enemy.isBoss ? COLORS.orange : COLORS.blue,
          0.5
        );
      }
    }

    function updateEnemies(delta) {
      gameState.enemies.forEach(enemy => {
        const dx = gameState.player.x - enemy.x;
        const dy = gameState.player.y - enemy.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 0) {
          enemy.vx = (dx / dist) * enemy.speed * 100 * delta;
          enemy.vy = (dy / dist) * enemy.speed * 100 * delta;
          enemy.x += enemy.vx;
          enemy.y += enemy.vy;
        }
        
        if (dist < enemy.size + gameState.player.size + 5) {
          const currentTime = gameTime;
          if (currentTime - enemy.lastAttack > enemy.attackCooldown / 1000) {
            enemy.lastAttack = currentTime;
            
            if (Math.random() > gameState.player.evasion) {
              const damage = Math.max(1, enemy.damage * (1 - gameState.player.armor));
              gameState.player.health -= damage;
              createDamageParticle(gameState.player.x, gameState.player.y, Math.floor(damage));
              
              if (gameState.player.health <= 0) {
                gameOver();
              }
            }
          }
        }
      });
    }

    function updateProjectiles(delta) {
      gameState.projectiles = gameState.projectiles.filter(proj => {
        proj.x += proj.vx * delta;
        proj.y += proj.vy * delta;
        proj.age += delta;
        
        if (proj.age > proj.lifetime) return false;
        
        if (proj.owner === 'player') {
          for (let i = 0; i < gameState.enemies.length; i++) {
            const enemy = gameState.enemies[i];
            const dx = proj.x - enemy.x;
            const dy = proj.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < enemy.size + proj.size) {
              damageEnemy(enemy, proj.damage);
              return false;
            }
          }
        }
        
        return true;
      });
    }

    function updateParticles(delta) {
      gameState.particles = gameState.particles.filter(particle => {
        particle.x += particle.vx * delta;
        particle.y += particle.vy * delta;
        particle.life -= delta;
        
        return particle.life > 0;
      });
    }

    function updateExpOrbs(delta) {
      const magnetRange = 150;
      
      gameState.expOrbs = gameState.expOrbs.filter(orb => {
        const dx = gameState.player.x - orb.x;
        const dy = gameState.player.y - orb.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < magnetRange) {
          const speed = 300;
          orb.x += (dx / dist) * speed * delta;
          orb.y += (dy / dist) * speed * delta;
        }
        
        if (dist < gameState.player.size + orb.size) {
          gameState.player.exp += orb.value;
          
          if (gameState.player.exp >= gameState.player.expNeeded) {
            levelUp();
          }
          
          return false;
        }
        
        return true;
      });
    }

    function levelUp() {
      gameState.player.level++;
      gameState.player.exp -= gameState.player.expNeeded;
      gameState.player.expNeeded = Math.floor(gameState.player.expNeeded * 1.5);
      
      if (gameState.player.level === 5) {
        gameState.player.weapons.push({ ...WEAPON_TYPES.sword, lastFired: 0, level: 1 });
        showStatusMessage('🗡️ Sword Unlocked!');
      } else if (gameState.player.level === 10) {
        if (Math.random() < 0.5) {
          gameState.player.weapons.push({ ...WEAPON_TYPES.doubleBarrel, lastFired: 0, level: 1 });
          showStatusMessage('💥 Double Barrel Unlocked!');
        } else {
          gameState.player.weapons.push({ ...WEAPON_TYPES.aura, lastFired: 0, level: 1 });
          showStatusMessage('✨ Energy Aura Unlocked!');
        }
      }
      
      showLevelUpModal();
    }

    function render() {
      // Apply camera shake
      let shakeX = 0;
      let shakeY = 0;
      if (gameState.cameraShake && gameState.cameraShake.time < gameState.cameraShake.duration) {
        const progress = gameState.cameraShake.time / gameState.cameraShake.duration;
        const intensity = gameState.cameraShake.intensity * (1 - progress);
        shakeX = (Math.random() - 0.5) * intensity * 2;
        shakeY = (Math.random() - 0.5) * intensity * 2;
      }
      
      // Fill with darker background for atmosphere
      ctx.fillStyle = '#0a0f14';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      // Save context for shake
      ctx.save();
      ctx.translate(shakeX, shakeY);
      
      drawGrid();
      
      // Draw blood decals (persistent impacts)
      if (gameState.decals) {
        gameState.decals.forEach(decal => {
          const screenX = decal.x - gameState.camera.x;
          const screenY = decal.y - gameState.camera.y;
          
          if (screenX >= -20 && screenX <= CANVAS_WIDTH + 20 && screenY >= -20 && screenY <= CANVAS_HEIGHT + 20) {
            ctx.globalAlpha = decal.alpha;
            ctx.fillStyle = decal.color;
            
            // Irregular blood splatter shape
            ctx.fillRect(screenX - decal.size/2, screenY - decal.size/2, decal.size, decal.size);
            ctx.fillRect(screenX - decal.size/3, screenY - decal.size/2 - 1, decal.size * 0.6, decal.size + 2);
            ctx.fillRect(screenX - decal.size/2 - 1, screenY - decal.size/3, decal.size + 2, decal.size * 0.6);
            
            ctx.globalAlpha = 1;
          }
        });
      }
      
      // Enhanced ambient floating particles (dust, light motes, fireflies)
      for (let i = 0; i < 30; i++) {
        const px = ((gameState.camera.x + i * 40 + gameTime * 10) % MAP_WIDTH) - gameState.camera.x;
        const py = ((gameState.camera.y + i * 30 + Math.sin(gameTime + i) * 20) % MAP_HEIGHT) - gameState.camera.y;
        
        if (px >= 0 && px < CANVAS_WIDTH && py >= 0 && py < CANVAS_HEIGHT) {
          const pulse = Math.sin(gameTime * 2 + i) * 0.5 + 0.5;
          ctx.fillStyle = `rgba(173, 216, 230, ${pulse * 0.4})`;
          ctx.fillRect(px - 1, py - 1, 3, 3);
          ctx.fillStyle = `rgba(255, 255, 255, ${pulse * 0.6})`;
          ctx.fillRect(px, py, 1, 1);
        }
      }
      
      gameState.expOrbs.forEach(orb => {
        const screenX = orb.x - gameState.camera.x;
        const screenY = orb.y - gameState.camera.y;
        
        if (screenX < -50 || screenX > CANVAS_WIDTH + 50 || screenY < -50 || screenY > CANVAS_HEIGHT + 50) return;
        
        // Add light glow around exp orbs
        const glowSize = 30;
        for (let r = glowSize; r > 0; r -= 5) {
          const alpha = (1 - r / glowSize) * 0.1;
          ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
          ctx.fillRect(screenX - r, screenY - r, r * 2, r * 2);
        }
        
        drawStar(screenX, screenY, orb.size, 8, COLORS.gold);
      });
      
      gameState.particles.forEach(particle => {
        const screenX = particle.x - gameState.camera.x;
        const screenY = particle.y - gameState.camera.y;
        
        const alpha = particle.life / particle.maxLife;
        ctx.globalAlpha = alpha;
        
        // Enhanced particles with glow
        ctx.fillStyle = particle.color;
        ctx.fillRect(screenX - 3, screenY - 3, 6, 6);
        ctx.fillRect(screenX - 2, screenY - 2, 4, 4);
        
        // Particle light
        if (particle.color.includes('255')) {
          ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.3})`;
          ctx.fillRect(screenX - 6, screenY - 6, 12, 12);
        }
        
        ctx.globalAlpha = 1;
      });
      
      // Draw projectiles with enhanced lighting
      gameState.projectiles.forEach(proj => {
        const screenX = proj.x - gameState.camera.x;
        const screenY = proj.y - gameState.camera.y;
        
        // Projectile light emission
        const projLightRadius = 40;
        for (let r = projLightRadius; r > 0; r -= 8) {
          const alpha = (1 - r / projLightRadius) * 0.2;
          ctx.fillStyle = `rgba(255, 165, 0, ${alpha})`;
          ctx.fillRect(screenX - r, screenY - r, r * 2, r * 2);
        }
        
        // Enhanced projectile with multiple layers
        ctx.fillStyle = '#804000';
        ctx.fillRect(screenX - proj.size, screenY - proj.size, proj.size * 2, proj.size * 2);
        
        ctx.fillStyle = COLORS.orange;
        ctx.fillRect(screenX - proj.size / 2, screenY - proj.size / 2, proj.size, proj.size);
        
        // Bright core
        ctx.fillStyle = '#FFFF00';
        ctx.fillRect(screenX - 2, screenY - 2, 4, 4);
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(screenX - 1, screenY - 1, 2, 2);
        
        // Trail effect
        ctx.fillStyle = 'rgba(255, 165, 0, 0.4)';
        ctx.fillRect(screenX - proj.size - 3, screenY - proj.size - 3, proj.size * 2 + 6, proj.size * 2 + 6);
      });
      
      // Draw enemies with enhanced lighting effects
      gameState.enemies.forEach(enemy => {
        const screenX = enemy.x - gameState.camera.x;
        const screenY = enemy.y - gameState.camera.y;
        
        if (screenX < -100 || screenX > CANVAS_WIDTH + 100 || screenY < -100 || screenY > CANVAS_HEIGHT + 100) return;
        
        // Enemy light emission (bosses and certain types)
        if (enemy.isBoss) {
          const enemyLightRadius = 60;
          for (let r = enemyLightRadius; r > 0; r -= 10) {
            const alpha = (1 - r / enemyLightRadius) * 0.15;
            ctx.fillStyle = `rgba(255, 140, 0, ${alpha})`;
            ctx.fillRect(screenX - r, screenY - r, r * 2, r * 2);
          }
        }
        
        drawEnemy(screenX, screenY, enemy);
        
        // Enhanced health bar with glow
        if (enemy.health < enemy.maxHealth) {
          const barWidth = enemy.size * 2;
          const barHeight = 4;
          const healthPercent = enemy.health / enemy.maxHealth;
          
          // Bar background with border
          ctx.fillStyle = '#000000';
          ctx.fillRect(screenX - barWidth / 2 - 1, screenY - enemy.size - 11, barWidth + 2, barHeight + 2);
          
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(screenX - barWidth / 2, screenY - enemy.size - 10, barWidth, barHeight);
          
          // Health fill with gradient effect
          const healthColor = enemy.isBoss ? COLORS.orange : COLORS.blue;
          ctx.fillStyle = healthColor;
          ctx.fillRect(screenX - barWidth / 2, screenY - enemy.size - 10, barWidth * healthPercent, barHeight);
          
          // Bright overlay on health bar
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.fillRect(screenX - barWidth / 2, screenY - enemy.size - 10, barWidth * healthPercent, 1);
        }
      });
      
      const playerScreenX = gameState.player.x - gameState.camera.x;
      const playerScreenY = gameState.player.y - gameState.camera.y;
      
      // Enhanced player lighting aura (multi-layer)
      const lightRadius = 120;
      for (let r = lightRadius; r > 0; r -= 15) {
        const alpha = (1 - r / lightRadius) * 0.25;
        const pulse = Math.sin(gameTime * 2) * 0.05 + 0.95;
        ctx.fillStyle = `rgba(93, 173, 226, ${alpha * pulse})`;
        ctx.fillRect(playerScreenX - r, playerScreenY - r, r * 2, r * 2);
      }
      
      // Inner bright light
      for (let r = 40; r > 0; r -= 8) {
        const alpha = (1 - r / 40) * 0.3;
        ctx.fillStyle = `rgba(173, 216, 230, ${alpha})`;
        ctx.fillRect(playerScreenX - r, playerScreenY - r, r * 2, r * 2);
      }
      
      drawPlayer(playerScreenX, playerScreenY);
      
      // Enhanced weapon aura effect
      gameState.player.weapons.forEach(weapon => {
        if (weapon.type === 'aura') {
          const auraPulse = Math.sin(gameTime * 4) * 0.3 + 0.7;
          
          // Outer glow
          ctx.fillStyle = `rgba(93, 173, 226, ${auraPulse * 0.15})`;
          ctx.fillRect(playerScreenX - weapon.range - 10, playerScreenY - weapon.range - 10, 
                       (weapon.range + 10) * 2, (weapon.range + 10) * 2);
          
          // Inner glow
          ctx.fillStyle = `rgba(93, 173, 226, ${auraPulse * 0.25})`;
          ctx.fillRect(playerScreenX - weapon.range, playerScreenY - weapon.range, 
                       weapon.range * 2, weapon.range * 2);
          
          // Aura ring
          ctx.strokeStyle = COLORS.blue;
          ctx.lineWidth = 3;
          ctx.globalAlpha = auraPulse * 0.5;
          ctx.beginPath();
          ctx.arc(playerScreenX, playerScreenY, weapon.range, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      });
      
      // Restore context after shake
      ctx.restore();
      
      // Apply darkness overlay for atmospheric effect
      ctx.fillStyle = 'rgba(10, 15, 20, 0.3)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      // Screen flash effect on crit
      if (gameState.screenFlash && gameState.screenFlash.time < gameState.screenFlash.duration) {
        const progress = gameState.screenFlash.time / gameState.screenFlash.duration;
        const alpha = gameState.screenFlash.intensity * (1 - progress);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      }
    }

    function drawGrid() {
      const tileSize = 16;
      const startX = Math.floor(gameState.camera.x / tileSize) * tileSize;
      const startY = Math.floor(gameState.camera.y / tileSize) * tileSize;
      
      // Draw enhanced pixel art tiles with variation
      for (let x = startX; x < gameState.camera.x + CANVAS_WIDTH; x += tileSize) {
        for (let y = startY; y < gameState.camera.y + CANVAS_HEIGHT; y += tileSize) {
          const screenX = x - gameState.camera.x;
          const screenY = y - gameState.camera.y;
          
          // Pseudo-random seed based on position
          const seed = Math.abs(Math.sin(x * 0.01) * Math.cos(y * 0.01) * 1000);
          const variant = Math.floor(seed % 10);
          
          // Base terrain colors with more variety
          const darkGreen = '#0f2419';
          const baseGreen = '#1a3a2e';
          const midGreen = '#1e4530';
          const lightGreen = '#234d37';
          const veryLightGreen = '#2a5940';
          
          // Choose base color with weighted randomness
          let baseColor;
          if (variant < 4) baseColor = baseGreen;
          else if (variant < 7) baseColor = midGreen;
          else if (variant < 9) baseColor = lightGreen;
          else baseColor = darkGreen;
          
          // Draw base tile
          ctx.fillStyle = baseColor;
          ctx.fillRect(screenX, screenY, tileSize, tileSize);
          
          // Add organic texture detail
          if (variant === 0 || variant === 3) {
            // Grass tuft detail
            ctx.fillStyle = veryLightGreen;
            ctx.fillRect(screenX + 2, screenY + 4, 2, 3);
            ctx.fillRect(screenX + 7, screenY + 8, 2, 3);
            ctx.fillRect(screenX + 11, screenY + 2, 2, 4);
          } else if (variant === 1 || variant === 5) {
            // Stone/pebble detail
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(screenX + 5, screenY + 6, 3, 3);
            ctx.fillRect(screenX + 4, screenY + 7, 1, 1);
            ctx.fillRect(screenX + 8, screenY + 7, 1, 1);
            
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(screenX + 5, screenY + 6, 2, 2);
          } else if (variant === 2) {
            // Crack pattern
            ctx.fillStyle = darkGreen;
            ctx.fillRect(screenX + 3, screenY + 8, 8, 1);
            ctx.fillRect(screenX + 6, screenY + 7, 1, 3);
          } else if (variant === 6) {
            // Moss patch
            ctx.fillStyle = lightGreen;
            ctx.fillRect(screenX + 4, screenY + 4, 6, 6);
            ctx.fillStyle = veryLightGreen;
            ctx.fillRect(screenX + 5, screenY + 5, 4, 4);
          } else if (variant === 8) {
            // Water reflection/puddle
            ctx.fillStyle = '#1a3d5c';
            ctx.fillRect(screenX + 3, screenY + 5, 8, 5);
            ctx.fillStyle = 'rgba(93, 173, 226, 0.3)';
            ctx.fillRect(screenX + 4, screenY + 6, 6, 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(screenX + 5, screenY + 6, 2, 1);
          }
          
          // Add subtle noise texture to all tiles
          if (variant % 2 === 0) {
            const noiseX = (seed * 7) % tileSize;
            const noiseY = (seed * 11) % tileSize;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(screenX + noiseX, screenY + noiseY, 1, 1);
          }
          
          // Random dark spots for depth
          if (variant === 4 || variant === 7) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(screenX + 2, screenY + 2, 2, 2);
            ctx.fillRect(screenX + 10, screenY + 11, 2, 2);
          }
        }
      }
    }

    function drawPlayer(x, y) {
      const size = gameState.player.size;
      
      // Wobble animation for soft-body physics
      const wobbleX = Math.sin(gameTime * 8) * 1.5;
      const wobbleY = Math.cos(gameTime * 8) * 1.5;
      const squishX = 1 + Math.sin(gameTime * 6) * 0.08;
      const squishY = 1 - Math.sin(gameTime * 6) * 0.08;
      
      // Draw shadow (soft, elliptical)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(x - size/2 + 2, y + size/2 + 2, size * 1.2, 5);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(x - size/2, y + size/2 + 1, size * 1.2 + 4, 6);
      
      // Water drop base (volumetric, multi-layer)
      // Darkest layer (depth)
      ctx.fillStyle = '#1B5E8F';
      const s1 = size * squishX;
      const s2 = size * squishY;
      ctx.fillRect(x - s1 * 0.55 + wobbleX * 0.3, y - s2 * 0.5, s1 * 1.1, s2 * 1.2);
      ctx.fillRect(x - s1 * 0.7 + wobbleX * 0.3, y - s2 * 0.2, s1 * 0.3, s2 * 0.6);
      ctx.fillRect(x + s1 * 0.4 + wobbleX * 0.3, y - s2 * 0.2, s1 * 0.3, s2 * 0.6);
      
      // Mid tone (main body)
      ctx.fillStyle = '#2E7CB5';
      ctx.fillRect(x - s1 * 0.5 + wobbleX * 0.5, y - s2 * 0.45, s1, s2 * 1.1);
      ctx.fillRect(x - s1 * 0.65 + wobbleX * 0.5, y - s2 * 0.15, s1 * 0.25, s2 * 0.5);
      ctx.fillRect(x + s1 * 0.4 + wobbleX * 0.5, y - s2 * 0.15, s1 * 0.25, s2 * 0.5);
      ctx.fillRect(x - s1 * 0.35 + wobbleX * 0.5, y + s2 * 0.5, s1 * 0.7, s2 * 0.3);
      
      // Bright blue (light side)
      ctx.fillStyle = '#3498DB';
      ctx.fillRect(x - s1 * 0.45 + wobbleX, y - s2 * 0.4, s1 * 0.9, s2);
      ctx.fillRect(x - s1 * 0.6 + wobbleX, y - s2 * 0.1, s1 * 0.2, s2 * 0.4);
      ctx.fillRect(x + s1 * 0.4 + wobbleX, y - s2 * 0.1, s1 * 0.2, s2 * 0.4);
      
      // Highlights (lighter blue)
      ctx.fillStyle = '#5DADE2';
      ctx.fillRect(x - s1 * 0.4 + wobbleX, y - s2 * 0.35, s1 * 0.5, s2 * 0.4);
      ctx.fillRect(x - s1 * 0.55 + wobbleX, y - s2 * 0.05, s1 * 0.15, s2 * 0.25);
      ctx.fillRect(x - s1 * 0.25 + wobbleX, y + s2 * 0.3, s1 * 0.5, s2 * 0.2);
      
      // Specular highlights (white shine)
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillRect(x - s1 * 0.3 + wobbleX * 1.2, y - s2 * 0.25, s1 * 0.25, s2 * 0.25);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.fillRect(x - s1 * 0.25 + wobbleX * 1.2, y - s2 * 0.2, s1 * 0.15, s2 * 0.15);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.fillRect(x - s1 * 0.2 + wobbleX * 1.2, y - s2 * 0.15, s1 * 0.1, s2 * 0.1);
      
      // Secondary highlight
      ctx.fillStyle = 'rgba(173, 216, 230, 0.6)';
      ctx.fillRect(x - s1 * 0.5 + wobbleX * 0.8, y + s2 * 0.1, s1 * 0.2, s2 * 0.15);
      
      // Rim lighting (edge glow)
      ctx.fillStyle = 'rgba(93, 173, 226, 0.3)';
      ctx.fillRect(x - s1 * 0.75, y - s2 * 0.5, s1 * 0.1, s2 * 1.2);
      ctx.fillRect(x + s1 * 0.65, y - s2 * 0.5, s1 * 0.1, s2 * 1.2);
      
      // Animated shimmer effect
      const shimmer = Math.sin(gameTime * 4) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(255, 255, 255, ${shimmer * 0.3})`;
      ctx.fillRect(x - s1 * 0.15 + wobbleX * 1.5, y - s2 * 0.1, s1 * 0.1, s2 * 0.2);
    }

    function drawEnemy(x, y, enemy) {
      const size = enemy.size;
      const breathe = Math.sin(gameTime * 3 + enemy.x) * 0.05 + 1;
      
      // Enhanced shadow with softness
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(x - size * 1.1, y + size * 0.9, size * 2.2, 4);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(x - size * 1.2, y + size * 0.85, size * 2.4, 6);
      
      if (enemy.type === 'square' || enemy.isBoss) {
        const mainColor = enemy.isBoss ? '#FF8C00' : '#654321';
        const darkColor = enemy.isBoss ? '#B35900' : '#3A1F0F';
        const midColor = enemy.isBoss ? '#CC7000' : '#4A3216';
        const lightColor = enemy.isBoss ? '#FFA500' : '#8B6331';
        const highlightColor = enemy.isBoss ? '#FFD700' : '#A67C52';
        
        const s = size * breathe;
        
        // Darkest outline/depth
        ctx.fillStyle = darkColor;
        ctx.fillRect(x - s * 1.05, y - s * 1.05, s * 2.1, s * 2.1);
        
        // Main body with texture
        ctx.fillStyle = mainColor;
        ctx.fillRect(x - s, y - s, s * 2, s * 2);
        
        // Add texture pattern
        ctx.fillStyle = midColor;
        for (let i = 0; i < 3; i++) {
          for (let j = 0; j < 3; j++) {
            if ((i + j) % 2 === 0) {
              ctx.fillRect(x - s + i * s * 0.6, y - s + j * s * 0.6, s * 0.4, s * 0.4);
            }
          }
        }
        
        // Deep shadow (right and bottom)
        ctx.fillStyle = darkColor;
        ctx.fillRect(x + s * 0.6, y - s, s * 0.4, s * 2);
        ctx.fillRect(x - s, y + s * 0.6, s * 2, s * 0.4);
        
        // Mid shadow
        ctx.fillStyle = midColor;
        ctx.fillRect(x + s * 0.3, y - s, s * 0.3, s * 2);
        ctx.fillRect(x - s, y + s * 0.3, s * 2, s * 0.3);
        
        // Highlights (top-left)
        ctx.fillStyle = lightColor;
        ctx.fillRect(x - s, y - s, s * 0.6, s * 0.6);
        ctx.fillRect(x - s * 0.7, y - s * 0.7, s * 0.3, s * 1.4);
        ctx.fillRect(x - s * 0.7, y - s * 0.7, s * 1.4, s * 0.3);
        
        // Bright specular highlight
        ctx.fillStyle = highlightColor;
        ctx.fillRect(x - s * 0.8, y - s * 0.8, s * 0.3, s * 0.3);
        
        // Eyes with glow
        ctx.fillStyle = '#330000';
        ctx.fillRect(x - s * 0.5, y - s * 0.25, s * 0.25, s * 0.3);
        ctx.fillRect(x + s * 0.25, y - s * 0.25, s * 0.25, s * 0.3);
        
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x - s * 0.45, y - s * 0.2, s * 0.15, s * 0.2);
        ctx.fillRect(x + s * 0.3, y - s * 0.2, s * 0.15, s * 0.2);
        
        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
        ctx.fillRect(x - s * 0.5, y - s * 0.25, s * 0.3, s * 0.35);
        ctx.fillRect(x + s * 0.2, y - s * 0.25, s * 0.3, s * 0.35);
        
        // Boss special effects
        if (enemy.isBoss) {
          const pulse = Math.sin(gameTime * 5) * 0.3 + 0.7;
          ctx.fillStyle = `rgba(255, 140, 0, ${pulse * 0.3})`;
          ctx.fillRect(x - s * 1.2, y - s * 1.2, s * 2.4, s * 2.4);
          ctx.fillStyle = `rgba(255, 165, 0, ${pulse * 0.2})`;
          ctx.fillRect(x - s * 1.4, y - s * 1.4, s * 2.8, s * 2.8);
        }
      } else if (enemy.type === 'triangle') {
        const mainColor = '#8B4513';
        const darkColor = '#3A1F0F';
        const midColor = '#654321';
        const lightColor = '#A0522D';
        
        const s = size * breathe;
        
        // Pixel art triangle with enhanced shading
        for (let i = 0; i < s * 2; i++) {
          const w = (s * 2) - i;
          const ratio = i / (s * 2);
          
          // Gradient from light to dark
          if (ratio < 0.3) {
            ctx.fillStyle = lightColor;
          } else if (ratio < 0.6) {
            ctx.fillStyle = mainColor;
          } else {
            ctx.fillStyle = midColor;
          }
          ctx.fillRect(x - w/2, y - s + i, w, 1);
        }
        
        // Deep shadow on right side
        ctx.fillStyle = darkColor;
        for (let i = s; i < s * 2; i++) {
          const w = (s * 2) - i;
          ctx.fillRect(x - w/2 + w * 0.7, y - s + i, w * 0.3, 1);
        }
        
        // Texture detail
        for (let i = s * 0.5; i < s * 1.5; i += s * 0.4) {
          const w = (s * 2) - i;
          ctx.fillStyle = darkColor;
          ctx.fillRect(x - w/2 + w * 0.1, y - s + i, w * 0.15, 2);
        }
        
        // Eyes with pupils
        ctx.fillStyle = '#330000';
        ctx.fillRect(x - s * 0.3, y - s * 0.1, s * 0.15, s * 0.15);
        ctx.fillRect(x + s * 0.15, y - s * 0.1, s * 0.15, s * 0.15);
        
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x - s * 0.25, y - s * 0.05, s * 0.1, s * 0.1);
        ctx.fillRect(x + s * 0.2, y - s * 0.05, s * 0.1, s * 0.1);
      } else if (enemy.type === 'round') {
        const mainColor = '#8B4513';
        const darkColor = '#3A1F0F';
        const midColor = '#654321';
        const lightColor = '#A0522D';
        const highlightColor = '#CD853F';
        
        const s = size * breathe;
        
        // Multi-layer circle for volume
        ctx.fillStyle = darkColor;
        ctx.fillRect(x - s * 0.5, y - s * 1.05, s, s * 2.1);
        ctx.fillRect(x - s * 1.05, y - s * 0.5, s * 2.1, s);
        ctx.fillRect(x - s * 0.75, y - s * 0.75, s * 1.5, s * 1.5);
        
        ctx.fillStyle = midColor;
        ctx.fillRect(x - s * 0.5, y - s, s, s * 2);
        ctx.fillRect(x - s, y - s * 0.5, s * 2, s);
        ctx.fillRect(x - s * 0.7, y - s * 0.7, s * 1.4, s * 1.4);
        
        ctx.fillStyle = mainColor;
        ctx.fillRect(x - s * 0.45, y - s * 0.9, s * 0.9, s * 1.8);
        ctx.fillRect(x - s * 0.9, y - s * 0.45, s * 1.8, s * 0.9);
        ctx.fillRect(x - s * 0.65, y - s * 0.65, s * 1.3, s * 1.3);
        
        // Shadow on right and bottom
        ctx.fillStyle = darkColor;
        ctx.fillRect(x + s * 0.3, y - s * 0.5, s * 0.5, s);
        ctx.fillRect(x, y + s * 0.3, s, s * 0.5);
        ctx.fillRect(x + s * 0.2, y + s * 0.2, s * 0.5, s * 0.5);
        
        // Highlights on top-left
        ctx.fillStyle = lightColor;
        ctx.fillRect(x - s * 0.7, y - s * 0.7, s * 0.4, s * 0.4);
        ctx.fillRect(x - s * 0.5, y - s * 0.5, s * 0.3, s * 0.5);
        ctx.fillRect(x - s * 0.5, y - s * 0.5, s * 0.5, s * 0.3);
        
        ctx.fillStyle = highlightColor;
        ctx.fillRect(x - s * 0.6, y - s * 0.6, s * 0.25, s * 0.25);
        
        // Texture spots
        ctx.fillStyle = darkColor;
        ctx.fillRect(x - s * 0.3, y - s * 0.3, s * 0.15, s * 0.15);
        ctx.fillRect(x + s * 0.2, y - s * 0.1, s * 0.15, s * 0.15);
        ctx.fillRect(x - s * 0.1, y + s * 0.3, s * 0.15, s * 0.15);
        
        // Eyes
        ctx.fillStyle = '#330000';
        ctx.fillRect(x - s * 0.35, y - s * 0.15, s * 0.15, s * 0.15);
        ctx.fillRect(x + s * 0.2, y - s * 0.15, s * 0.15, s * 0.15);
        
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x - s * 0.3, y - s * 0.1, s * 0.1, s * 0.1);
        ctx.fillRect(x + s * 0.25, y - s * 0.1, s * 0.1, s * 0.1);
      }
    }

    function drawStar(x, y, size, points, color) {
      // Pixel art star
      ctx.fillStyle = color;
      
      // Center diamond
      ctx.fillRect(x - size/2, y - 2, size, 4);
      ctx.fillRect(x - 2, y - size/2, 4, size);
      
      // Corners
      ctx.fillRect(x - size/3, y - size/3, size * 2/3, size * 2/3);
      
      // Glow effect
      ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
      ctx.fillRect(x - size, y - size, size * 2, size * 2);
      
      // Bright center
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x - 2, y - 2, 4, 4);
      
      // Animated sparkle
      if (Math.floor(gameTime * 3) % 2 === 0) {
        ctx.fillStyle = color;
        ctx.fillRect(x - size - 2, y - 1, 2, 2);
        ctx.fillRect(x + size, y - 1, 2, 2);
        ctx.fillRect(x - 1, y - size - 2, 2, 2);
        ctx.fillRect(x - 1, y + size, 2, 2);
      }
    }

    function createParticle(x, y, vx, vy, color, life) {
      gameState.particles.push({
        x, y, vx, vy, color, life, maxLife: life
      });
    }

    function createDamageParticle(x, y, damage) {
      createParticle(x, y - 10, (Math.random() - 0.5) * 50, -50, COLORS.orange, 0.5);
    }

    function createSlashEffect(x1, y1, x2, y2) {
      for (let i = 0; i < 5; i++) {
        const t = i / 5;
        const x = x1 + (x2 - x1) * t;
        const y = y1 + (y2 - y1) * t;
        createParticle(x, y, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, COLORS.blue, 0.3);
      }
    }

    function updateHUD() {
      document.getElementById('level').textContent = gameState.player.level;
      document.getElementById('health').textContent = Math.floor(gameState.player.health);
      document.getElementById('maxHealth').textContent = gameState.player.maxHealth;
      document.getElementById('exp').textContent = gameState.player.exp;
      document.getElementById('expNeeded').textContent = gameState.player.expNeeded;
      document.getElementById('gold').textContent = gameState.player.gold;
      document.getElementById('kills').textContent = gameState.player.kills;
      
      const healthPercent = (gameState.player.health / gameState.player.maxHealth) * 100;
      document.getElementById('healthFill').style.width = healthPercent + '%';
      
      const expPercent = (gameState.player.exp / gameState.player.expNeeded) * 100;
      document.getElementById('expFill').style.width = expPercent + '%';
    }

    function showLevelUpModal() {
      gameState.paused = true;
      const modal = document.getElementById('levelUpModal');
      const optionsDiv = document.getElementById('upgradeOptions');
      
      const shuffled = [...UPGRADES].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 3);
      
      optionsDiv.innerHTML = '';
      selected.forEach(upgrade => {
        const div = document.createElement('div');
        div.className = 'upgrade-option';
        div.innerHTML = `
          <h3>${upgrade.name}</h3>
          <p>${upgrade.description}</p>
        `;
        div.onclick = () => {
          upgrade.apply(gameState.player);
          modal.classList.remove('active');
          gameState.paused = false;
          showStatusMessage(`✨ ${upgrade.name}!`);
        };
        optionsDiv.appendChild(div);
      });
      
      modal.classList.add('active');
    }

    function showStatusMessage(msg) {
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.textContent = msg;
      statusMsg.style.display = 'block';
      
      setTimeout(() => {
        statusMsg.style.display = 'none';
      }, 2000);
    }

    function hideAllModals() {
      document.querySelectorAll('.modal').forEach(modal => {
        modal.classList.remove('active');
      });
    }

    function showVictory() {
      const modal = document.getElementById('victoryModal');
      const statsDiv = document.getElementById('finalStats');
      
      statsDiv.innerHTML = `
        <p>Final Level: ${gameState.player.level}</p>
        <p>Total Kills: ${gameState.player.kills}</p>
        <p>Gold Collected: ${gameState.player.gold}</p>
        <p>Time: ${Math.floor(gameTime / 60)}:${Math.floor(gameTime % 60).toString().padStart(2, '0')}</p>
      `;
      
      modal.classList.add('active');
      checkAchievements();
    }

    function gameOver() {
      gameState.gameOver = true;
      showStatusMessage('💀 GAME OVER 💀');
      
      setTimeout(() => {
        if (confirm('Game Over! Restart?')) {
          initGame();
        }
      }, 1000);
    }

    function saveGame() {
      const saveData = {
        player: gameState.player,
        gameTime,
        shopPurchases: gameState.shopPurchases,
        achievements: gameState.achievements
      };
      
      localStorage.setItem('waterdrop_save', JSON.stringify(saveData));
      showStatusMessage('💾 Game Saved!');
    }

    function loadGame() {
      const saveData = localStorage.getItem('waterdrop_save');
      if (saveData) {
        const data = JSON.parse(saveData);
        gameState.player = data.player;
        gameTime = data.gameTime || 0;
        gameState.shopPurchases = data.shopPurchases || {};
        gameState.achievements = data.achievements || [];
        
        gameState.enemies = [];
        gameState.projectiles = [];
        gameState.particles = [];
        gameState.expOrbs = [];
        
        showStatusMessage('📂 Game Loaded!');
        updateHUD();
      } else {
        showStatusMessage('❌ No Save Found!');
      }
    }

    function openShop() {
      const modal = document.getElementById('shopModal');
      const itemsDiv = document.getElementById('shopItems');
      
      itemsDiv.innerHTML = '';
      SHOP_ITEMS.forEach(item => {
        const purchased = gameState.shopPurchases[item.id];
        const canAfford = gameState.player.gold >= item.cost;
        
        if (purchased && !item.repeatable) return;
        
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.innerHTML = `
          <div>
            <strong>${item.name}</strong><br>
            <small>Cost: ${item.cost} Gold</small>
          </div>
          <button ${canAfford ? '' : 'disabled'}>Buy</button>
        `;
        
        div.querySelector('button').onclick = () => {
          if (canAfford) {
            gameState.player.gold -= item.cost;
            gameState.shopPurchases[item.id] = true;
            item.apply(gameState.player);
            showStatusMessage(`✅ Purchased ${item.name}!`);
            openShop();
            updateHUD();
          }
        };
        
        itemsDiv.appendChild(div);
      });
      
      modal.classList.add('active');
    }

    function checkAchievements() {
      ACHIEVEMENT_DEFS.forEach(achievement => {
        if (!gameState.achievements.includes(achievement.id) && achievement.check()) {
          gameState.achievements.push(achievement.id);
          showStatusMessage(`🏆 ${achievement.name}!`);
        }
      });
    }

    function openAchievements() {
      const modal = document.getElementById('achievementsModal');
      const listDiv = document.getElementById('achievementsList');
      
      listDiv.innerHTML = '';
      ACHIEVEMENT_DEFS.forEach(achievement => {
        const unlocked = gameState.achievements.includes(achievement.id);
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.style.opacity = unlocked ? '1' : '0.4';
        div.innerHTML = `
          <div>
            <strong>${unlocked ? '✅' : '🔒'} ${achievement.name}</strong><br>
            <small>${achievement.description}</small>
          </div>
        `;
        listDiv.appendChild(div);
      });
      
      modal.classList.add('active');
    }

    window.addEventListener('keydown', (e) => {
      gameState.keys[e.key] = true;
      
      if (e.key === 'Escape') {
        togglePause();
      }
    });

    window.addEventListener('keyup', (e) => {
      gameState.keys[e.key] = false;
    });

    const joystick = document.getElementById('joystick');
    const joystickStick = document.getElementById('joystickStick');
    
    let touchId = null;
    
    joystick.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      touchId = touch.identifier;
      updateJoystick(touch);
    });
    
    joystick.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = Array.from(e.touches).find(t => t.identifier === touchId);
      if (touch) updateJoystick(touch);
    });
    
    joystick.addEventListener('touchend', (e) => {
      e.preventDefault();
      touchId = null;
      gameState.joystick.active = false;
      gameState.joystick.x = 0;
      gameState.joystick.y = 0;
      joystickStick.style.transform = 'translate(-50%, -50%)';
    });
    
    function updateJoystick(touch) {
      const rect = joystick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      let dx = touch.clientX - centerX;
      let dy = touch.clientY - centerY;
      
      const maxDist = 40;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist > maxDist) {
        dx = (dx / dist) * maxDist;
        dy = (dy / dist) * maxDist;
      }
      
      gameState.joystick.active = true;
      gameState.joystick.x = dx / maxDist;
      gameState.joystick.y = dy / maxDist;
      
      joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    document.getElementById('menuBtn').onclick = togglePause;
    document.getElementById('resumeBtn').onclick = togglePause;
    document.getElementById('shopBtn').onclick = () => {
      hideAllModals();
      openShop();
    };
    document.getElementById('achievementsBtn').onclick = () => {
      hideAllModals();
      openAchievements();
    };
    document.getElementById('saveBtn').onclick = saveGame;
    document.getElementById('loadBtn').onclick = loadGame;
    document.getElementById('mainMenuBtnFromPause').onclick = () => {
      hideAllModals();
      gameState.paused = true;
      showMainMenu();
      document.getElementById('continueGameBtn').style.display = 'block';
    };
    document.getElementById('restartBtn').onclick = () => {
      if (confirm('Restart game? Progress will be lost.')) {
        initGame();
      }
    };
    document.getElementById('closeShopBtn').onclick = () => {
      hideAllModals();
      togglePause();
    };
    document.getElementById('closeAchievementsBtn').onclick = () => {
      hideAllModals();
      togglePause();
    };
    document.getElementById('restartFromVictoryBtn').onclick = () => {
      initGame();
    };

    function togglePause() {
      if (gameState.victory || gameState.gameOver) return;
      
      gameState.paused = !gameState.paused;
      const pauseModal = document.getElementById('pauseModal');
      
      if (gameState.paused) {
        pauseModal.classList.add('active');
      } else {
        hideAllModals();
      }
    }

    function animate(currentTime) {
      // CRITICAL: Call requestAnimationFrame FIRST
      requestAnimationFrame(animate);
      
      // Calculate delta time
      if (lastTime === 0) {
        lastTime = currentTime;
      }
      
      dt = currentTime - lastTime;
      lastTime = currentTime;
      
      // Cap delta time to prevent huge jumps
      if (dt > 100) dt = 100;
      
      // Update and render
      update(dt);
      render();
    }

    // Start animation loop but don't init game yet (wait for menu)
    function startGame() {
      initGame();
    }
    
    function startNewGame() {
      initGame();
      document.getElementById('continueGameBtn').style.display = 'block';
    }
    
    requestAnimationFrame(animate);
  </script>
</body>
</html>
