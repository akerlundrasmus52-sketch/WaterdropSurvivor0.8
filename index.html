<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Water Drop Survivor - Pixel Art Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0a0a0a;
      font-family: 'Courier New', monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #gameCanvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #1a2f1a;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
    }

    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .hud {
      position: absolute;
      top: 15px;
      left: 15px;
      color: #FFD700;
      font-size: 16px;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.9), 0 0 8px rgba(255, 215, 0, 0.6);
      pointer-events: none;
      line-height: 1.8;
      background: rgba(10, 20, 30, 0.85);
      padding: 12px 15px;
      border: 3px solid #FFD700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .health-bar, .exp-bar {
      width: 220px;
      height: 22px;
      background: #0a1a20;
      border: 3px solid #FFD700;
      margin: 6px 0;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7), 0 0 12px rgba(255, 215, 0, 0.35);
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #4A90E2 0%, #5DADE2 50%, #7EC8F5 100%);
      transition: width 0.3s;
      box-shadow: 0 0 10px rgba(93, 173, 226, 0.6);
    }

    .exp-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      transition: width 0.3s;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
    }

    .stat-text {
      font-size: 14px;
      margin: 3px 0;
      color: #FFF;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.9);
    }

    .modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 20, 30, 0.97);
      border: 5px solid #FFD700;
      padding: 30px;
      border-radius: 0px;
      pointer-events: auto;
      z-index: 100;
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.5);
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h2 {
      color: #5DADE2;
      font-size: 32px;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 3px 3px 0 #2574A9, 0 0 20px rgba(93, 173, 226, 0.8);
    }

    .upgrade-container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .upgrade-card {
      background: rgba(30, 50, 70, 0.9);
      border: 4px solid #5DADE2;
      padding: 20px;
      width: 200px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #2574A9, 0 0 15px rgba(93, 173, 226, 0.4);
    }

    .upgrade-card:hover {
      transform: translateY(-5px);
      border-color: #FFD700;
      box-shadow: 0 8px 0 #FFA500, 0 0 25px rgba(255, 215, 0, 0.7);
    }

    .upgrade-card:active {
      transform: translateY(0);
      box-shadow: 0 2px 0 #2574A9;
    }

    .upgrade-title {
      color: #FFD700;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
    }

    .upgrade-desc {
      color: #CCC;
      font-size: 13px;
      line-height: 1.5;
    }

    .upgrade-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    #startButton {
      background: linear-gradient(180deg, #5DADE2 0%, #4A90E2 100%);
      border: 5px solid #FFD700;
      padding: 20px 60px;
      color: #FFF;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.6);
      box-shadow: 0 6px 0 #3498DB, 0 0 20px rgba(255, 215, 0, 0.5);
      pointer-events: auto;
    }

    #startButton:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #3498DB, 0 0 30px rgba(255, 215, 0, 0.8);
    }

    #startButton:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #3498DB;
    }

    .menu-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .menu-title {
      font-size: 56px;
      font-weight: bold;
      color: #5DADE2;
      text-shadow: 6px 6px 0 #2574A9, 0 0 30px rgba(93, 173, 226, 0.9);
      animation: titleFloat 3s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .floating-text {
      position: absolute;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      z-index: 50;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.9), 0 0 10px currentColor;
      animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-80px); }
    }

    .joystick-container {
      position: absolute;
      width: 120px;
      height: 120px;
      pointer-events: auto;
      z-index: 20;
    }

    .joystick-base {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(93, 173, 226, 0.3) 0%, rgba(93, 173, 226, 0.15) 100%);
      border: 4px solid rgba(93, 173, 226, 0.5);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 20px rgba(93, 173, 226, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .joystick-stick {
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #5DADE2 0%, #4A90E2 100%);
      border: 4px solid #FFD700;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 0 #3498DB, 0 0 15px rgba(255, 215, 0, 0.6);
      transition: all 0.1s;
    }

    #leftJoystick {
      bottom: 30px;
      left: 30px;
    }

    #rightJoystick {
      bottom: 30px;
      right: 30px;
    }

    .damage-number {
      position: absolute;
      font-size: 24px;
      font-weight: bold;
      color: #FF3333;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.9), 0 0 10px #FF3333;
      pointer-events: none;
      z-index: 40;
      animation: damageFloat 0.8s ease-out forwards;
    }

    .damage-number.crit {
      font-size: 32px;
      color: #FFD700;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.9), 0 0 15px #FFD700;
    }

    @keyframes damageFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
    }

    .gold-text {
      color: #FFD700;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.9), 0 0 10px #FFD700;
    }

    @media (max-width: 768px) {
      .hud {
        font-size: 14px;
        padding: 10px;
      }
      .health-bar, .exp-bar {
        width: 180px;
        height: 18px;
      }
      .menu-title {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div class="ui-overlay">
    <div class="hud">
      <div class="stat-text">Level: <span id="levelText">1</span></div>
      <div class="health-bar">
        <div class="health-fill" id="healthFill"></div>
      </div>
      <div class="stat-text">HP: <span id="hpText">100/100</span></div>
      <div class="exp-bar">
        <div class="exp-fill" id="expFill"></div>
      </div>
      <div class="stat-text">XP: <span id="expText">0/10</span></div>
      <div class="stat-text gold-text">Gold: <span id="goldText">0</span></div>
      <div class="stat-text">Kills: <span id="killsText">0</span></div>
      <div class="stat-text" style="font-size: 12px; color: #AAA;">Time: <span id="timeText">0:00</span></div>
    </div>

    <div id="upgradeModal" class="modal" style="display: none;">
      <h2>⬆️ LEVEL UP! ⬆️</h2>
      <p style="text-align: center; color: #FFF; margin-bottom: 20px;">Choose an upgrade:</p>
      <div class="upgrade-container" id="upgradeOptions"></div>
    </div>

    <div id="startModal" class="modal">
      <div class="menu-container">
        <div class="menu-title">💧 WATER DROP SURVIVOR 💧</div>
        <button id="startButton">START GAME</button>
        <div style="color: #CCC; text-align: center; margin-top: 10px; font-size: 14px;">
          <p>WASD / Arrow Keys - Move</p>
          <p>Mouse - Aim & Shoot</p>
          <p>Touch - Virtual Joysticks</p>
          <p style="margin-top: 10px; color: #5DADE2;">High-Fidelity Pixel Art Edition</p>
        </div>
      </div>
    </div>

    <div class="joystick-container" id="leftJoystick" style="display: none;">
      <div class="joystick-base">
        <div class="joystick-stick" id="leftStick"></div>
      </div>
    </div>

    <div class="joystick-container" id="rightJoystick" style="display: none;">
      <div class="joystick-base">
        <div class="joystick-stick" id="rightStick"></div>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // GAME CONFIGURATION
    // ============================================
    const CONFIG = {
      CANVAS_WIDTH: 390,  // iPhone 16 width
      CANVAS_HEIGHT: 844, // iPhone 16 height (portrait)
      MAP_SIZE: 1500,     // Smaller map to fit screen without scrolling
      PLAYER_SIZE: 20,
      ENEMY_SIZE: 16,
      PARTICLE_COUNT: 30,
      CAMERA_SMOOTH: 0.1,
      AIM_OFFSET: 80,
      DASH_COOLDOWN: 1.0, // Dash cooldown in seconds
      DASH_SPEED: 500,    // Dash speed
      DASH_DURATION: 0.2, // Dash duration in seconds
    };

    // Enemy type definitions
    const ENEMY_TYPES = [
      { name: 'Tank', hp: 150, speed: 1.0, damage: 8, color: '#FF69B4', size: 28, xp: 15, gold: 0.2 },
      { name: 'Fast', hp: 50, speed: 4.0, damage: 5, color: '#FF6B6B', size: 16, xp: 5, gold: 0.1 },
      { name: 'Balanced', hp: 100, speed: 2.0, damage: 7, color: '#4ECDC4', size: 20, xp: 10, gold: 0.15 },
      { name: 'Slowing', hp: 120, speed: 1.5, damage: 6, color: '#00FFFF', size: 22, xp: 12, gold: 0.2, slow: true },
      { name: 'Ranged', hp: 80, speed: 1.2, damage: 7, color: '#FF6347', size: 18, xp: 12, gold: 0.25, ranged: true },
      { name: 'Flying', hp: 90, speed: 3.0, damage: 6, color: '#87CEEB', size: 19, xp: 11, gold: 0.2, flying: true },
      { name: 'HardTank', hp: 250, speed: 0.8, damage: 12, color: '#FF1493', size: 32, xp: 25, gold: 0.3 },
      { name: 'HardFast', hp: 75, speed: 5.0, damage: 8, color: '#FFD700', size: 18, xp: 15, gold: 0.2 },
      { name: 'HardBalanced', hp: 180, speed: 2.5, damage: 10, color: '#9932CC', size: 24, xp: 20, gold: 0.25 },
      { name: 'Elite', hp: 300, speed: 2.0, damage: 15, color: '#FF0000', size: 30, xp: 30, gold: 0.5 },
    ];

    // ============================================
    // GAME STATE
    // ============================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let gameStarted = false;
    let gameTime = 0;
    let lastTime = 0;

    // Player state
    const player = {
      x: CONFIG.MAP_SIZE / 2,
      y: CONFIG.MAP_SIZE / 2,
      vx: 0,
      vy: 0,
      angle: 0,
      targetAngle: 0, // For smooth rotation animation
      hp: 100,
      maxHp: 100,
      level: 1,
      xp: 0,
      xpToLevel: 10,
      gold: 0,
      kills: 0,
      
      // Stats
      speed: 3.5,
      damage: 15,
      attackSpeed: 1.0,
      critChance: 0.1,
      critDamage: 1.5,
      armor: 0,
      dodge: 0,
      healthRegen: 0,
      pickupRange: 150,
      projectileSpeed: 1.0,
      
      // Weapons
      weapons: ['gun'],
      gunCooldown: 0,
      swordCooldown: 0,
      hasEnergyAura: false,
      auraRadius: 100,
      auraDamage: 5,
      auraCooldown: 0,
      
      // Effects
      slowed: false,
      slowEndTime: 0,
      invulnerable: false,
      invulnerableUntil: 0,
      
      // Dash mechanics
      isDashing: false,
      dashTime: 0,
      dashDx: 0,
      dashDy: 0,
      dashCooldownRemaining: 0,
      
      // Animation
      wobblePhase: 0,
      squishX: 1,
      squishY: 1,
    };

    // Camera
    const camera = {
      x: player.x,
      y: player.y,
      targetX: player.x,
      targetY: player.y,
      shake: 0,
      shakeX: 0,
      shakeY: 0,
    };

    // Input
    const input = {
      moveX: 0,
      moveY: 0,
      aimX: 0,
      aimY: 0,
      keys: {},
      mouse: { x: canvas.width / 2, y: canvas.height / 2 },
      touch: {
        left: { active: false, x: 0, y: 0, startX: 0, startY: 0 },
        right: { active: false, x: 0, y: 0, startX: 0, startY: 0 }
      }
    };

    // Game objects
    const enemies = [];
    const projectiles = [];
    const particles = [];
    const floatingTexts = [];
    const expGems = [];
    const goldCoins = [];
    const enemyProjectiles = [];

    // Landmarks
    const landmarks = {
      stonehenge: { x: 400, y: 400, radius: 80 },
      pyramid: { x: 1100, y: 1100, width: 120, height: 120 }
    };

    // Wave system
    let waveNumber = 0;
    let enemiesSpawnedThisWave = 0;
    let enemiesPerWave = 10;

    // ============================================
    // SETUP
    // ============================================
    function init() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      // Keyboard
      window.addEventListener('keydown', e => {
        input.keys[e.key.toLowerCase()] = true;
        
        // Dash on spacebar
        if (e.key === ' ' && !player.isDashing && player.dashCooldownRemaining <= 0) {
          if (input.moveX !== 0 || input.moveY !== 0) {
            performDash(input.moveX, input.moveY);
          }
        }
      });
      window.addEventListener('keyup', e => input.keys[e.key.toLowerCase()] = false);
      
      // Mouse
      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        input.mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
        input.mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
      });
      
      // Touch for joysticks
      setupTouchControls();
      
      // Start button
      document.getElementById('startButton').addEventListener('click', startGame);
    }

    function resizeCanvas() {
      const container = document.body;
      const aspectRatio = CONFIG.CANVAS_WIDTH / CONFIG.CANVAS_HEIGHT;
      let width = window.innerWidth;
      let height = window.innerHeight;
      
      if (width / height > aspectRatio) {
        width = height * aspectRatio;
      } else {
        height = width / aspectRatio;
      }
      
      canvas.width = CONFIG.CANVAS_WIDTH;
      canvas.height = CONFIG.CANVAS_HEIGHT;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
    }

    function setupTouchControls() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile) {
        document.getElementById('leftJoystick').style.display = 'block';
        document.getElementById('rightJoystick').style.display = 'block';
      }

      const leftJoy = document.getElementById('leftJoystick');
      const rightJoy = document.getElementById('rightJoystick');
      const leftStick = document.getElementById('leftStick');
      const rightStick = document.getElementById('rightStick');
      
      // Swipe detection for dash (on canvas)
      let swipeStart = null;
      canvas.addEventListener('touchstart', e => {
        // Only track swipes outside joystick areas
        const touch = e.touches[0];
        const leftRect = leftJoy.getBoundingClientRect();
        const rightRect = rightJoy.getBoundingClientRect();
        
        const inLeftJoy = touch.clientX >= leftRect.left && touch.clientX <= leftRect.right &&
                         touch.clientY >= leftRect.top && touch.clientY <= leftRect.bottom;
        const inRightJoy = touch.clientX >= rightRect.left && touch.clientX <= rightRect.right &&
                          touch.clientY >= rightRect.top && touch.clientY <= rightRect.bottom;
        
        if (!inLeftJoy && !inRightJoy) {
          swipeStart = { x: touch.clientX, y: touch.clientY, time: Date.now() };
        }
      });
      
      canvas.addEventListener('touchend', e => {
        if (swipeStart) {
          const touch = e.changedTouches[0];
          const dx = touch.clientX - swipeStart.x;
          const dy = touch.clientY - swipeStart.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const time = Date.now() - swipeStart.time;
          
          // Swipe threshold: 50px in less than 300ms
          if (distance > 50 && time < 300) {
            performDash(dx, dy);
          }
          
          swipeStart = null;
        }
      });

      function handleJoystickStart(e, joy, isLeft) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = joy.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        if (isLeft) {
          input.touch.left.active = true;
          input.touch.left.startX = centerX;
          input.touch.left.startY = centerY;
        } else {
          input.touch.right.active = true;
          input.touch.right.startX = centerX;
          input.touch.right.startY = centerY;
        }
      }

      function handleJoystickMove(e, joy, stick, isLeft) {
        e.preventDefault();
        const touchData = isLeft ? input.touch.left : input.touch.right;
        if (!touchData.active) return;

        const touch = e.touches[0];
        const dx = touch.clientX - touchData.startX;
        const dy = touch.clientY - touchData.startY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const maxDistance = 35;
        
        const clampedDist = Math.min(distance, maxDistance);
        const angle = Math.atan2(dy, dx);
        const x = Math.cos(angle) * clampedDist;
        const y = Math.sin(angle) * clampedDist;
        
        stick.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        
        touchData.x = x / maxDistance;
        touchData.y = y / maxDistance;
      }

      function handleJoystickEnd(e, stick, isLeft) {
        e.preventDefault();
        stick.style.transform = 'translate(-50%, -50%)';
        
        if (isLeft) {
          input.touch.left.active = false;
          input.touch.left.x = 0;
          input.touch.left.y = 0;
        } else {
          input.touch.right.active = false;
          input.touch.right.x = 0;
          input.touch.right.y = 0;
        }
      }

      leftJoy.addEventListener('touchstart', e => handleJoystickStart(e, leftJoy, true));
      leftJoy.addEventListener('touchmove', e => handleJoystickMove(e, leftJoy, leftStick, true));
      leftJoy.addEventListener('touchend', e => handleJoystickEnd(e, leftStick, true));

      rightJoy.addEventListener('touchstart', e => handleJoystickStart(e, rightJoy, false));
      rightJoy.addEventListener('touchmove', e => handleJoystickMove(e, rightJoy, rightStick, false));
      rightJoy.addEventListener('touchend', e => handleJoystickEnd(e, rightStick, false));
    }

    function startGame() {
      gameStarted = true;
      document.getElementById('startModal').style.display = 'none';
      // Grace period: spawn first wave after 3 seconds
      setTimeout(() => {
        spawnEnemyWave();
      }, 3000);
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    // ============================================
    // GAME LOOP
    // ============================================
    function gameLoop(currentTime) {
      if (!gameStarted) return;
      
      const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.1);
      lastTime = currentTime;
      gameTime += deltaTime;
      
      update(deltaTime);
      render();
      
      requestAnimationFrame(gameLoop);
    }

    function update(dt) {
      updateInput(dt);
      updatePlayer(dt);
      updateCamera(dt);
      updateEnemies(dt);
      updateProjectiles(dt);
      updateEnemyProjectiles(dt);
      updateParticles(dt);
      updateCollectibles(dt);
      updateFloatingTexts(dt);
      updateWaves(dt);
      updateUI();
    }

    function updateInput(dt) {
      // Keyboard movement
      input.moveX = 0;
      input.moveY = 0;
      
      if (input.keys['w'] || input.keys['arrowup']) input.moveY -= 1;
      if (input.keys['s'] || input.keys['arrowdown']) input.moveY += 1;
      if (input.keys['a'] || input.keys['arrowleft']) input.moveX -= 1;
      if (input.keys['d'] || input.keys['arrowright']) input.moveX += 1;
      
      // Touch movement
      if (input.touch.left.active) {
        input.moveX = input.touch.left.x;
        input.moveY = input.touch.left.y;
      }
      
      // Normalize movement
      const moveMag = Math.sqrt(input.moveX * input.moveX + input.moveY * input.moveY);
      if (moveMag > 0) {
        input.moveX /= moveMag;
        input.moveY /= moveMag;
      }
      
      // Aiming
      if (input.touch.right.active) {
        input.aimX = input.touch.right.x;
        input.aimY = input.touch.right.y;
      } else {
        // Mouse aim (world space)
        const worldMouseX = input.mouse.x + camera.x - canvas.width / 2;
        const worldMouseY = input.mouse.y + camera.y - canvas.height / 2;
        const dx = worldMouseX - player.x;
        const dy = worldMouseY - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          input.aimX = dx / dist;
          input.aimY = dy / dist;
        }
      }
    }

    function updatePlayer(dt) {
      // Dash cooldown
      if (player.dashCooldownRemaining > 0) {
        player.dashCooldownRemaining -= dt;
      }
      
      // Dash logic
      if (player.isDashing) {
        player.dashTime -= dt;
        
        // Dash movement with sine curve for smooth acceleration/deceleration
        const t = 1 - (player.dashTime / CONFIG.DASH_DURATION);
        const dashSpeed = Math.sin(t * Math.PI) * CONFIG.DASH_SPEED;
        
        player.x += player.dashDx * dashSpeed * dt;
        player.y += player.dashDy * dashSpeed * dt;
        
        // Create dash trail particles
        if (Math.random() < 0.3) {
          createParticle(player.x, player.y, '#5DADE2', 8, player.vx * 0.5, player.vy * 0.5);
        }
        
        if (player.dashTime <= 0) {
          player.isDashing = false;
        }
      } else {
        // Normal movement with slow effect
        const speedMult = player.slowed ? 0.5 : 1.0;
        player.vx = input.moveX * player.speed * speedMult;
        player.vy = input.moveY * player.speed * speedMult;
        
        player.x += player.vx;
        player.y += player.vy;
      }
      
      // Map bounds
      player.x = Math.max(CONFIG.PLAYER_SIZE, Math.min(CONFIG.MAP_SIZE - CONFIG.PLAYER_SIZE, player.x));
      player.y = Math.max(CONFIG.PLAYER_SIZE, Math.min(CONFIG.MAP_SIZE - CONFIG.PLAYER_SIZE, player.y));
      
      // Smooth 360-degree rotation
      if (input.aimX !== 0 || input.aimY !== 0) {
        player.targetAngle = Math.atan2(input.aimY, input.aimX);
      } else if (input.moveX !== 0 || input.moveY !== 0) {
        player.targetAngle = Math.atan2(input.moveY, input.moveX);
      }
      
      // Smooth angle interpolation for 360-degree animation
      let angleDiff = player.targetAngle - player.angle;
      // Normalize to -PI to PI
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      player.angle += angleDiff * 0.15; // Smooth rotation
      
      // Enhanced wobble animation based on movement
      const moveSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
      player.wobblePhase += dt * (3 + moveSpeed * 0.5);
      
      // Squish effect based on movement (inertia)
      const targetSquishX = 1 + Math.abs(player.vx) * 0.02;
      const targetSquishY = 1 + Math.abs(player.vy) * 0.02;
      player.squishX += (targetSquishX - player.squishX) * 0.1;
      player.squishY += (targetSquishY - player.squishY) * 0.1;
      
      // Check slow effect expiration
      if (player.slowed && gameTime > player.slowEndTime) {
        player.slowed = false;
      }
      
      // Health regen
      if (player.healthRegen > 0) {
        player.hp = Math.min(player.maxHp, player.hp + player.healthRegen * dt);
      }
      
      // Weapon cooldowns
      if (player.gunCooldown > 0) player.gunCooldown -= dt;
      if (player.swordCooldown > 0) player.swordCooldown -= dt;
      if (player.auraCooldown > 0) player.auraCooldown -= dt;
      
      // Auto-fire gun
      if (player.weapons.includes('gun') && player.gunCooldown <= 0) {
        shootGun();
        player.gunCooldown = 1 / player.attackSpeed;
      }
      
      // Sword attack
      if (player.weapons.includes('sword') && player.swordCooldown <= 0) {
        swordSlash();
        player.swordCooldown = 2 / player.attackSpeed;
      }
      
      // Energy aura
      if (player.hasEnergyAura && player.auraCooldown <= 0) {
        energyAura();
        player.auraCooldown = 0.5;
      }
    }

    function updateCamera(dt) {
      // Fixed camera centered on map - no movement
      camera.x = CONFIG.MAP_SIZE / 2;
      camera.y = CONFIG.MAP_SIZE / 2;
      camera.targetX = camera.x;
      camera.targetY = camera.y;
      
      // Screen shake only
      if (camera.shake > 0) {
        camera.shake -= dt * 5;
        camera.shakeX = (Math.random() - 0.5) * camera.shake * 20;
        camera.shakeY = (Math.random() - 0.5) * camera.shake * 20;
      } else {
        camera.shakeX = 0;
        camera.shakeY = 0;
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        
        // AI: move toward player
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 0) {
          const moveSpeed = enemy.speed * dt * 60;
          enemy.x += (dx / dist) * moveSpeed;
          enemy.y += (dy / dist) * moveSpeed;
          enemy.angle = Math.atan2(dy, dx);
        }
        
        // Ranged attack
        if (enemy.ranged) {
          enemy.attackCooldown = (enemy.attackCooldown || 0) - dt;
          if (enemy.attackCooldown <= 0 && dist < 500) {
            shootEnemyProjectile(enemy);
            enemy.attackCooldown = 2;
          }
        }
        
        // Collision with player (melee)
        const playerDist = Math.sqrt(
          (enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2
        );
        
        if (playerDist < CONFIG.PLAYER_SIZE + enemy.size) {
          enemy.attackCooldown = (enemy.attackCooldown || 0) - dt;
          if (enemy.attackCooldown <= 0) {
            damagePlayer(enemy.damage);
            if (enemy.slow) {
              player.slowed = true;
              player.slowEndTime = gameTime + 2;
            }
            enemy.attackCooldown = 1.5; // Increased from 1
          }
        }
        
        // Remove if dead
        if (enemy.hp <= 0) {
          enemyDeath(enemy);
          enemies.splice(i, 1);
        }
      }
    }

    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const proj = projectiles[i];
        
        proj.x += proj.vx * dt * 60;
        proj.y += proj.vy * dt * 60;
        proj.life -= dt;
        
        // Check collision with enemies
        for (let j = enemies.length - 1; j >= 0; j--) {
          const enemy = enemies[j];
          const dist = Math.sqrt(
            (proj.x - enemy.x) ** 2 + (proj.y - enemy.y) ** 2
          );
          
          if (dist < enemy.size) {
            const isCrit = Math.random() < player.critChance;
            const damage = player.damage * (isCrit ? player.critDamage : 1);
            enemy.hp -= damage;
            
            createDamageNumber(enemy.x, enemy.y, Math.floor(damage), isCrit);
            createBloodParticles(enemy.x, enemy.y, enemy.color);
            
            projectiles.splice(i, 1);
            break;
          }
        }
        
        if (proj.life <= 0) {
          projectiles.splice(i, 1);
        }
      }
    }

    function updateEnemyProjectiles(dt) {
      for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        const proj = enemyProjectiles[i];
        
        proj.x += proj.vx * dt * 60;
        proj.y += proj.vy * dt * 60;
        proj.life -= dt;
        
        // Check collision with player
        const dist = Math.sqrt(
          (proj.x - player.x) ** 2 + (proj.y - player.y) ** 2
        );
        
        if (dist < CONFIG.PLAYER_SIZE) {
          damagePlayer(proj.damage);
          enemyProjectiles.splice(i, 1);
          continue;
        }
        
        if (proj.life <= 0) {
          enemyProjectiles.splice(i, 1);
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        
        p.x += p.vx * dt * 60;
        p.y += p.vy * dt * 60;
        p.vy += p.gravity * dt * 60;
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.life -= dt;
        p.alpha = p.life / p.maxLife;
        
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function updateCollectibles(dt) {
      // XP Gems
      for (let i = expGems.length - 1; i >= 0; i--) {
        const gem = expGems[i];
        const dx = player.x - gem.x;
        const dy = player.y - gem.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < player.pickupRange) {
          gem.x += (dx / dist) * 8;
          gem.y += (dy / dist) * 8;
        }
        
        if (dist < CONFIG.PLAYER_SIZE) {
          player.xp += gem.value;
          checkLevelUp();
          expGems.splice(i, 1);
        }
      }
      
      // Gold Coins
      for (let i = goldCoins.length - 1; i >= 0; i--) {
        const coin = goldCoins[i];
        const dx = player.x - coin.x;
        const dy = player.y - coin.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < player.pickupRange) {
          coin.x += (dx / dist) * 8;
          coin.y += (dy / dist) * 8;
        }
        
        if (dist < CONFIG.PLAYER_SIZE) {
          player.gold += coin.value;
          createFloatingText(coin.x, coin.y, `+${coin.value}`, '#FFD700');
          goldCoins.splice(i, 1);
        }
      }
    }

    function updateFloatingTexts(dt) {
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const text = floatingTexts[i];
        text.life -= dt;
        text.y -= 50 * dt;
        text.alpha = text.life / text.maxLife;
        
        if (text.life <= 0) {
          floatingTexts.splice(i, 1);
        }
      }
    }

    function updateWaves(dt) {
      // Spawn enemies based on time
      if (Math.random() < 0.01 + waveNumber * 0.005) {
        spawnEnemy();
      }
      
      // Every 30 seconds, increase difficulty
      if (Math.floor(gameTime / 30) > waveNumber) {
        waveNumber++;
        enemiesPerWave += 2;
        createFloatingText(player.x, player.y - 60, `WAVE ${waveNumber + 1}`, '#FF0000');
      }
    }

    // ============================================
    // COMBAT
    // ============================================
    function shootGun() {
      const speed = 15 * player.projectileSpeed;
      const spread = 0.05;
      const angle = player.angle + (Math.random() - 0.5) * spread;
      
      projectiles.push({
        x: player.x + Math.cos(angle) * 20,
        y: player.y + Math.sin(angle) * 20,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 2,
        color: '#FFD700',
        size: 4,
      });
      
      createMuzzleFlash(player.x, player.y, angle);
    }

    function swordSlash() {
      const range = 70;
      const arc = Math.PI / 3;
      
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angleToEnemy = Math.atan2(dy, dx);
        const angleDiff = Math.abs(((angleToEnemy - player.angle + Math.PI) % (Math.PI * 2)) - Math.PI);
        
        if (dist < range && angleDiff < arc / 2) {
          const isCrit = Math.random() < player.critChance;
          const damage = player.damage * 2 * (isCrit ? player.critDamage : 1);
          enemy.hp -= damage;
          
          createDamageNumber(enemy.x, enemy.y, Math.floor(damage), isCrit);
          createBloodParticles(enemy.x, enemy.y, enemy.color);
        }
      }
    }

    function energyAura() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const dist = Math.sqrt(
          (enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2
        );
        
        if (dist < player.auraRadius) {
          const damage = player.auraDamage;
          enemy.hp -= damage;
          createDamageNumber(enemy.x, enemy.y, Math.floor(damage), false);
        }
      }
    }

    function shootEnemyProjectile(enemy) {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 8;
      
      enemyProjectiles.push({
        x: enemy.x,
        y: enemy.y,
        vx: (dx / dist) * speed,
        vy: (dy / dist) * speed,
        life: 3,
        damage: enemy.damage,
        color: '#FF0000',
        size: 6,
      });
    }

    function damagePlayer(damage) {
      // Check invulnerability frames (0.5 seconds after taking damage)
      if (player.invulnerable && gameTime < player.invulnerableUntil) {
        return;
      }
      
      const actualDamage = Math.max(1, damage - player.armor);
      
      if (Math.random() < player.dodge) {
        createFloatingText(player.x, player.y - 30, 'DODGE!', '#00FF00');
        return;
      }
      
      player.hp -= actualDamage;
      createDamageNumber(player.x, player.y - 30, Math.floor(actualDamage), false);
      camera.shake = 1;
      
      // Set invulnerability frames
      player.invulnerable = true;
      player.invulnerableUntil = gameTime + 0.5;
      
      if (player.hp <= 0) {
        gameOver();
      }
    }

    function gameOver() {
      const minutes = Math.floor(gameTime / 60);
      const seconds = Math.floor(gameTime % 60);
      alert(`Game Over!\nTime: ${minutes}:${seconds.toString().padStart(2, '0')}\nKills: ${player.kills}\nLevel: ${player.level}`);
      location.reload();
    }

    function performDash(dx, dy) {
      if (player.isDashing || player.dashCooldownRemaining > 0) return;
      
      // Normalize direction
      const mag = Math.sqrt(dx * dx + dy * dy);
      if (mag === 0) return;
      
      player.dashDx = dx / mag;
      player.dashDy = dy / mag;
      player.isDashing = true;
      player.dashTime = CONFIG.DASH_DURATION;
      player.dashCooldownRemaining = CONFIG.DASH_COOLDOWN;
      
      // Create dash particles
      for (let i = 0; i < 10; i++) {
        createParticle(
          player.x + (Math.random() - 0.5) * 20,
          player.y + (Math.random() - 0.5) * 20,
          '#7EC8F5',
          6,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        );
      }
    }

    // ============================================
    // ENEMIES
    // ============================================
    function spawnEnemy() {
      // Select enemy type based on wave
      let typeIndex = 0;
      if (waveNumber < 5) {
        typeIndex = Math.floor(Math.random() * 3); // Basic enemies
      } else if (waveNumber < 10) {
        typeIndex = Math.floor(Math.random() * 6); // Add special enemies
      } else {
        typeIndex = Math.floor(Math.random() * ENEMY_TYPES.length); // All enemies
      }
      
      const type = ENEMY_TYPES[typeIndex];
      
      // Spawn outside screen (farther away)
      const angle = Math.random() * Math.PI * 2;
      const distance = 1200; // Increased from 900
      
      // Scale with wave
      const waveScale = 1 + waveNumber * 0.1;
      
      enemies.push({
        x: player.x + Math.cos(angle) * distance,
        y: player.y + Math.sin(angle) * distance,
        hp: type.hp * waveScale,
        maxHp: type.hp * waveScale,
        speed: type.speed,
        damage: type.damage * waveScale,
        color: type.color,
        size: type.size,
        type: type.name,
        angle: 0,
        attackCooldown: 0,
        xpValue: type.xp,
        goldChance: type.gold,
        ranged: type.ranged || false,
        slow: type.slow || false,
        flying: type.flying || false,
      });
    }

    function spawnEnemyWave() {
      for (let i = 0; i < 5; i++) {
        spawnEnemy();
      }
    }

    function enemyDeath(enemy) {
      player.kills++;
      
      createBloodParticles(enemy.x, enemy.y, enemy.color, 20);
      
      // Drop XP
      for (let i = 0; i < 3; i++) {
        expGems.push({
          x: enemy.x + (Math.random() - 0.5) * 30,
          y: enemy.y + (Math.random() - 0.5) * 30,
          value: Math.floor(enemy.xpValue / 3),
          color: '#FFD700',
        });
      }
      
      // Drop gold
      if (Math.random() < enemy.goldChance) {
        goldCoins.push({
          x: enemy.x,
          y: enemy.y,
          value: 2 + Math.floor(Math.random() * 3),
          color: '#FFD700',
        });
      }
    }

    // ============================================
    // PARTICLES & VFX
    // ============================================
    function createBloodParticles(x, y, color, count = 10) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          gravity: 0.2,
          life: 0.5 + Math.random() * 0.5,
          maxLife: 1,
          alpha: 1,
          color: color,
          size: Math.random() * 4 + 2,
        });
      }
    }

    function createMuzzleFlash(x, y, angle) {
      for (let i = 0; i < 5; i++) {
        const spread = 0.3;
        const a = angle + (Math.random() - 0.5) * spread;
        const speed = Math.random() * 2 + 3;
        
        particles.push({
          x: x + Math.cos(angle) * 20,
          y: y + Math.sin(angle) * 20,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          gravity: 0,
          life: 0.1 + Math.random() * 0.1,
          maxLife: 0.2,
          alpha: 1,
          color: '#FFD700',
          size: 3,
        });
      }
    }

    function createDamageNumber(x, y, damage, isCrit) {
      floatingTexts.push({
        x, y,
        text: damage.toString(),
        color: isCrit ? '#FFD700' : '#FF3333',
        isCrit,
        life: 1,
        maxLife: 1,
        alpha: 1,
      });
    }

    function createFloatingText(x, y, text, color) {
      floatingTexts.push({
        x, y,
        text,
        color,
        isCrit: false,
        life: 1,
        maxLife: 1,
        alpha: 1,
      });
    }

    // ============================================
    // PROGRESSION
    // ============================================
    function checkLevelUp() {
      while (player.xp >= player.xpToLevel) {
        player.xp -= player.xpToLevel;
        player.level++;
        player.xpToLevel = Math.floor(player.xpToLevel * 1.5);
        
        player.hp = player.maxHp;
        
        showUpgradeModal();
        
        // Unlock weapons
        if (player.level === 5 && !player.weapons.includes('sword')) {
          player.weapons.push('sword');
          createFloatingText(player.x, player.y - 50, 'SWORD UNLOCKED!', '#FFD700');
        }
        
        if (player.level === 10 && !player.hasEnergyAura) {
          player.hasEnergyAura = true;
          createFloatingText(player.x, player.y - 50, 'ENERGY AURA UNLOCKED!', '#00FFFF');
        }
      }
    }

    function showUpgradeModal() {
      const modal = document.getElementById('upgradeModal');
      const container = document.getElementById('upgradeOptions');
      container.innerHTML = '';
      
      const allUpgrades = [
        { id: 'dmg', title: '⚔️ Damage +10%', desc: 'Increase weapon damage', apply: () => player.damage *= 1.1 },
        { id: 'atkspd', title: '⚡ Attack Speed +10%', desc: 'Attack faster', apply: () => player.attackSpeed *= 1.1 },
        { id: 'hp', title: '❤️ Max HP +20', desc: 'Increase health', apply: () => { player.maxHp += 20; player.hp += 20; } },
        { id: 'armor', title: '🛡️ Armor +5', desc: 'Reduce damage taken', apply: () => player.armor += 5 },
        { id: 'speed', title: '👟 Speed +10%', desc: 'Move faster', apply: () => player.speed *= 1.1 },
        { id: 'crit', title: '💥 Crit Chance +5%', desc: 'Higher critical hit chance', apply: () => player.critChance += 0.05 },
        { id: 'critdmg', title: '🔥 Crit Damage +20%', desc: 'Stronger critical hits', apply: () => player.critDamage += 0.2 },
        { id: 'regen', title: '💚 HP Regen +1/s', desc: 'Regenerate health', apply: () => player.healthRegen += 1 },
        { id: 'pickup', title: '🧲 Pickup Range +20%', desc: 'Collect items from farther', apply: () => player.pickupRange *= 1.2 },
        { id: 'projspd', title: '🎯 Projectile Speed +15%', desc: 'Faster bullets', apply: () => player.projectileSpeed *= 1.15 },
        { id: 'dodge', title: '💨 Dodge +5%', desc: 'Chance to avoid damage', apply: () => player.dodge += 0.05 },
        { id: 'aura', title: '⚡ Aura Damage +3', desc: 'Stronger energy aura', apply: () => player.auraDamage += 3 },
        { id: 'aurasize', title: '🌊 Aura Range +15%', desc: 'Larger energy aura', apply: () => player.auraRadius *= 1.15 },
      ];
      
      // Pick 3 random upgrades
      const shuffled = allUpgrades.sort(() => Math.random() - 0.5);
      const choices = shuffled.slice(0, 3);
      
      choices.forEach(upgrade => {
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        card.innerHTML = `
          <div class="upgrade-icon">${upgrade.title.split(' ')[0]}</div>
          <div class="upgrade-title">${upgrade.title}</div>
          <div class="upgrade-desc">${upgrade.desc}</div>
        `;
        card.addEventListener('click', () => {
          upgrade.apply();
          modal.style.display = 'none';
          createFloatingText(player.x, player.y - 40, upgrade.title, '#FFD700');
        });
        container.appendChild(card);
      });
      
      modal.style.display = 'block';
    }

    // ============================================
    // RENDERING
    // ============================================
    function render() {
      ctx.fillStyle = '#1a2f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.save();
      ctx.translate(-camera.x + canvas.width / 2 + camera.shakeX, -camera.y + canvas.height / 2 + camera.shakeY);
      
      drawGrid();
      drawLandmarks();
      drawParticles();
      drawCollectibles();
      drawPlayer();
      drawEnemies();
      drawProjectiles();
      drawEnemyProjectiles();
      drawFloatingTexts();
      
      // Draw energy aura
      if (player.hasEnergyAura) {
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#00FFFF';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.auraRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      
      ctx.restore();
    }

    function drawGrid() {
      const gridSize = 100;
      const startX = Math.floor(camera.x / gridSize) * gridSize - canvas.width / 2;
      const startY = Math.floor(camera.y / gridSize) * gridSize - canvas.height / 2;
      const endX = startX + canvas.width + gridSize * 2;
      const endY = startY + canvas.height + gridSize * 2;
      
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.lineWidth = 1;
      
      for (let x = startX; x < endX; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, startY);
        ctx.lineTo(x, endY);
        ctx.stroke();
      }
      
      for (let y = startY; y < endY; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(endX, y);
        ctx.stroke();
      }
    }

    function drawLandmarks() {
      // Stonehenge
      const stonehenge = landmarks.stonehenge;
      const stoneCount = 30;
      const radius = stonehenge.radius;
      
      ctx.fillStyle = '#666';
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      
      for (let i = 0; i < stoneCount; i++) {
        const angle = (i / stoneCount) * Math.PI * 2;
        const x = stonehenge.x + Math.cos(angle) * radius;
        const y = stonehenge.y + Math.sin(angle) * radius;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillRect(-15, -30, 30, 60);
        ctx.strokeRect(-15, -30, 30, 60);
        ctx.restore();
      }
      
      // Mayan Pyramid
      const pyramid = landmarks.pyramid;
      const steps = 6;
      const stepHeight = pyramid.height / steps;
      
      for (let i = 0; i < steps; i++) {
        const scale = 1 - (i / steps) * 0.7;
        const w = pyramid.width * scale;
        const h = stepHeight;
        const x = pyramid.x - w / 2;
        const y = pyramid.y + pyramid.height - h * (i + 1);
        
        ctx.fillStyle = i % 2 === 0 ? '#8B7355' : '#A0826D';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#6B5344';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.angle);
      
      // Flash when invulnerable
      if (player.invulnerable && gameTime < player.invulnerableUntil) {
        const flashSpeed = 10; // Flash frequency
        if (Math.floor(gameTime * flashSpeed) % 2 === 0) {
          ctx.globalAlpha = 0.5;
        }
      }
      
      // Dash trail effect
      if (player.isDashing) {
        ctx.globalAlpha = 0.3;
        for (let i = 1; i <= 3; i++) {
          ctx.save();
          ctx.translate(-player.dashDx * CONFIG.PLAYER_SIZE * i * 0.5, -player.dashDy * CONFIG.PLAYER_SIZE * i * 0.5);
          ctx.scale(1 - i * 0.15, 1 - i * 0.15);
          
          const gradient = ctx.createRadialGradient(-5, -5, 0, 0, 0, CONFIG.PLAYER_SIZE);
          gradient.addColorStop(0, '#7EC8F5');
          gradient.addColorStop(1, '#4A90E2');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(0, 0, CONFIG.PLAYER_SIZE, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        ctx.globalAlpha = 1;
      }
      
      // Enhanced wobble/squish effect
      const wobbleAmount = Math.sin(player.wobblePhase) * 0.1;
      ctx.scale(player.squishX + wobbleAmount, player.squishY - wobbleAmount);
      
      // Shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.ellipse(2, 2, CONFIG.PLAYER_SIZE * 0.8, CONFIG.PLAYER_SIZE * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Water drop body (gradient) with improved detail
      const gradient = ctx.createRadialGradient(-5, -5, 0, 0, 0, CONFIG.PLAYER_SIZE);
      gradient.addColorStop(0, '#FFFFFF');  // White center for highlight
      gradient.addColorStop(0.2, '#7EC8F5'); // Light blue
      gradient.addColorStop(0.6, '#5DADE2'); // Medium blue
      gradient.addColorStop(1, '#4A90E2');   // Dark blue edge
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, CONFIG.PLAYER_SIZE, 0, Math.PI * 2);
      ctx.fill();
      
      // Enhanced highlight/shine
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.beginPath();
      ctx.arc(-6, -6, 6, 0, Math.PI * 2);
      ctx.fill();
      
      // Secondary smaller highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(-3, -10, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Direction indicator (aiming line)
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(CONFIG.PLAYER_SIZE + 8, 0);
      ctx.stroke();
      
      ctx.globalAlpha = 1; // Reset alpha
      ctx.restore();
    }

    function drawEnemies() {
      enemies.forEach(enemy => {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        
        // Shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(1, 1, enemy.size * 0.9, 0, Math.PI * 2);
        ctx.fill();
        
        // Body
        ctx.fillStyle = enemy.color;
        ctx.beginPath();
        
        // Different shapes based on type
        if (enemy.type.includes('Tank')) {
          ctx.fillRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2);
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          ctx.strokeRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2);
        } else if (enemy.type.includes('Fast')) {
          ctx.beginPath();
          ctx.moveTo(0, -enemy.size);
          ctx.lineTo(enemy.size, enemy.size);
          ctx.lineTo(-enemy.size, enemy.size);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          ctx.stroke();
        } else {
          ctx.arc(0, 0, enemy.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        
        // HP bar
        const barWidth = enemy.size * 2;
        const barHeight = 4;
        const hpPercent = enemy.hp / enemy.maxHp;
        
        ctx.fillStyle = '#000';
        ctx.fillRect(-barWidth / 2, -enemy.size - 10, barWidth, barHeight);
        ctx.fillStyle = '#0F0';
        ctx.fillRect(-barWidth / 2, -enemy.size - 10, barWidth * hpPercent, barHeight);
        
        ctx.restore();
      });
    }

    function drawProjectiles() {
      projectiles.forEach(proj => {
        ctx.fillStyle = proj.color;
        ctx.shadowColor = proj.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function drawEnemyProjectiles() {
      enemyProjectiles.forEach(proj => {
        ctx.fillStyle = proj.color;
        ctx.shadowColor = proj.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawCollectibles() {
      // XP Gems
      expGems.forEach(gem => {
        ctx.fillStyle = gem.color;
        ctx.shadowColor = gem.color;
        ctx.shadowBlur = 8;
        
        ctx.save();
        ctx.translate(gem.x, gem.y);
        ctx.rotate(gameTime * 2);
        
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const radius = i % 2 === 0 ? 8 : 5;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
        ctx.shadowBlur = 0;
      });
      
      // Gold Coins
      goldCoins.forEach(coin => {
        ctx.fillStyle = '#FFD700';
        ctx.strokeStyle = '#FFA500';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 10;
        
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        
        ctx.shadowBlur = 0;
      });
    }

    function drawFloatingTexts() {
      floatingTexts.forEach(text => {
        ctx.globalAlpha = text.alpha;
        ctx.fillStyle = text.color;
        ctx.font = text.isCrit ? 'bold 28px monospace' : 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 4;
        ctx.fillText(text.text, text.x, text.y);
        ctx.shadowBlur = 0;
      });
      ctx.globalAlpha = 1;
    }

    // ============================================
    // UI UPDATE
    // ============================================
    function updateUI() {
      document.getElementById('levelText').textContent = player.level;
      document.getElementById('hpText').textContent = `${Math.floor(player.hp)}/${player.maxHp}`;
      document.getElementById('expText').textContent = `${Math.floor(player.xp)}/${player.xpToLevel}`;
      document.getElementById('goldText').textContent = player.gold;
      document.getElementById('killsText').textContent = player.kills;
      
      const minutes = Math.floor(gameTime / 60);
      const seconds = Math.floor(gameTime % 60);
      document.getElementById('timeText').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      document.getElementById('healthFill').style.width = (player.hp / player.maxHp * 100) + '%';
      document.getElementById('expFill').style.width = (player.xp / player.xpToLevel * 100) + '%';
    }

    // ============================================
    // START
    // ============================================
    init();
  </script>
</body>
</html>
